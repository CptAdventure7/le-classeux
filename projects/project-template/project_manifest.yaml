project_name: project-template
project_slug: project-template
structure_version: 2
strategy: progressive_disclosure
runtime_scan:
  enabled: true
  cache_relative_path: 00_GOVERNANCE/current_overview/runtime_scan_summary.json
  refresh_after_hours: 24
  max_depth: 3
  include_sections:
    - 00_GOVERNANCE
    - 01_PROJECT_FOUNDATION
    - 03_REQUIREMENTS
    - 07_PROJECT_EXECUTION
    - 99_ARCHIVE
  meaningful_extensions:
    - .md
    - .json
  ignore_files:
    - README.md
    - project_manifest.yaml
    - local_manifest.yaml
    - .gitkeep
  ignore_section_ids:
    - 99_ARCHIVE
top_level_sections:
  - id: 00_GOVERNANCE
    purpose: "Program-level control documents, current state, and project memory."
    children:
      - id: change_log
        purpose: "Chronological governance-level changes, not detailed technical implementation notes."
      - id: current_overview
        purpose: "Short current-state summaries, active priorities, and navigation pointers for new readers."
        children: []
  - id: 01_PROJECT_FOUNDATION
    purpose: "Why the project exists, who it serves, and the constraints that frame all downstream work."
    children:
      - id: project_definition
        purpose: "Single-source definition of what the project is trying to accomplish and the current versus long-term scope boundaries."
        children: []
      - id: objectives_success_metrics
        purpose: "Artifacts specifically related to Objectives Success Metrics."
        children: []
      - id: stakeholders
        purpose: "Artifacts specifically related to Stakeholders."
        children: []
      - id: glossary
        purpose: "Artifacts specifically related to Glossary."
        children: []
      - id: assumptions_constraints
        purpose: "Artifacts specifically related to Assumptions Constraints."
        children: []
      - id: business_case
        purpose: "Artifacts specifically related to Business Case."
        children: []
  - id: 02_SYSTEM_DEFINITION
    purpose: "Problem framing for the system itself, including how users interact with it and how the architecture is partitioned."
    children:
      - id: use_cases
        purpose: "Artifacts specifically related to Use Cases."
        children: []
      - id: system_architecture
        purpose: "Artifacts specifically related to System Architecture."
        children: []
  - id: 03_REQUIREMENTS
    purpose: "Requirements decomposed from user intent to system and subsystem obligations."
    children:
      - id: user_requirements
        purpose: "User-facing needs, jobs-to-be-done, and externally visible acceptance statements."
        children: []
      - id: system_requirements
        purpose: "System-level requirements allocated from user needs, use cases, and constraints."
        children: []
      - id: subsystem_requirements
        purpose: "Subsystem-level requirement sets grouped by technical ownership boundaries."
        children: []
  - id: 04_DESIGN_AND_IMPLEMENTATION
    purpose: "Design artefacts, interface definitions, code references, prototypes, and technical risk information."
    children:
      - id: design
        purpose: "Design artefacts organized by subsystem or capability as the implementation matures."
        children: []
      - id: system_risk_register
        purpose: "Design and implementation risks, with triggers, mitigations, and owners."
        children: []
      - id: design_reviews
        purpose: "Artifacts specifically related to Design Reviews."
        children: []
      - id: prototypes
        purpose: "Prototype-specific folders. Add one subfolder per prototype stream when needed."
        children: []
  - id: 05_EXPERIMENT_AND_VERIFICATION
    purpose: "Experiment, verification, and analysis evidence."
    children:
      - id: test_protocols
        purpose: "Artifacts specifically related to Test Protocols."
        children: []
      - id: test_results
        purpose: "Artifacts specifically related to Test Results."
        children: []
      - id: experiments
        purpose: "Artifacts specifically related to Experiments."
        children: []
      - id: analysis
        purpose: "Artifacts specifically related to Analysis."
        children: []
      - id: lessons_learned
        purpose: "Artifacts specifically related to Lessons Learned."
        children: []
  - id: 06_RESEARCH_AND_REFERENCES
    purpose: "External knowledge, standards, prior art, supplier research, and citation support."
    children:
      - id: papers
        purpose: "Artifacts specifically related to Papers."
        children: []
      - id: standards
        purpose: "Artifacts specifically related to Standards."
        children: []
      - id: patents
        purpose: "Artifacts specifically related to Patents."
        children: []
      - id: competitor_landscape
        purpose: "Artifacts specifically related to Competitor Landscape."
        children: []
      - id: cots
        purpose: "Commercial off-the-shelf component evaluations. Add one subfolder per component area, keep one canonical JSON per area, and describe the exact local JSON contract in that subfolder README."
        children: []
      - id: web_references
        purpose: "Artifacts specifically related to Web References."
        children: []
      - id: presentations
        purpose: "Artifacts specifically related to Presentations."
        children: []
  - id: 07_PROJECT_EXECUTION
    purpose: "Planning, staffing, risk, and change-control artefacts used to steer delivery."
    children:
      - id: roadmap
        purpose: "Artifacts specifically related to Roadmap."
        children: []
      - id: execution_items
        purpose: "Unified execution tracking items. Keep one JSON file per item, using `type` to distinguish issue and milestone records."
        children: []
      - id: budget_resources
        purpose: "Artifacts specifically related to Budget Resources."
        children: []
      - id: procurement
        purpose: "Artifacts specifically related to Procurement."
        children: []
      - id: project_risk_register
        purpose: "Artifacts specifically related to Project Risk Register."
        children: []
      - id: change_requests
        purpose: "Artifacts specifically related to Change Requests."
        children: []
  - id: 08_DECISIONS
    purpose: "Decision records, trade studies, waivers, and other artifacts that explain why the project evolved."
    children: []
  - id: 09_COMMUNICATION
    purpose: "Project communication artifacts, including meetings, updates, and reporting."
    children:
      - id: meetings
        purpose: "Artifacts specifically related to Meetings."
        children:
          - id: raw_notes
            purpose: "Unedited capture from meetings. Preserve source fidelity and timestamp notes where possible."
            children: []
          - id: summaries
            purpose: "Cleaned summaries with decisions, actions, and traceable follow-up links."
            children: []
      - id: internal_updates
        purpose: "Artifacts specifically related to Internal Updates."
        children: []
      - id: external_updates
        purpose: "Artifacts specifically related to External Updates."
        children: []
      - id: reporting
        purpose: "Artifacts specifically related to Reporting."
        children: []
  - id: 10_OPERATIONS_AND_HANDOFF
    purpose: "Deployment, installation, training, and support material for transition to operations."
    children:
      - id: deployment_installation
        purpose: "Artifacts specifically related to Deployment and Installation."
        children: []
      - id: user_docs
        purpose: "Artifacts specifically related to User Docs."
        children: []
      - id: maintenance
        purpose: "Artifacts specifically related to Maintenance."
        children: []
      - id: training
        purpose: "Artifacts specifically related to Training."
        children: []
      - id: support_notes
        purpose: "Artifacts specifically related to Support Notes."
        children: []
  - id: 99_ARCHIVE
    purpose: "Retired, superseded, or preserved historical artefacts that should remain traceable but inactive."
    children:
      - id: current_overview
        purpose: "Retired weekly overviews and superseded current-state summaries kept for traceability."
        children: []
      - id: deprecated
        purpose: "Deprecated artefacts kept for reference."
        children: []
      - id: obsolete_decisions
        purpose: "Obsolete or superseded decisions kept for traceability."
        children: []
conventions:
  local_readme: Each folder contains a README.md explaining what belongs there and the local drafting, update, cross-linking, and formatting guidance.
  change_log_file: Each `change_log` folder keeps a single append-only `change_log.json` file with the newest entry first.
  requirement_traceability: Requirements should link to source, design allocation, validation, and decision history.


