<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roadmap Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f2efe8;
      --panel: #fffaf2;
      --ink: #1f2a33;
      --muted: #5d6a72;
      --line: #d9cfbf;
      --accent: #b85c38;
      --accent-soft: #f5d8c7;
      --planned: #d7dde2;
      --progress: #ffd8a8;
      --blocked: #f4b6b2;
      --done: #b9dec9;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
      color: var(--ink);
    }

    main {
      max-width: 1000px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    header {
      margin-bottom: 24px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .meta {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .source-links {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin: 16px 0 0;
      padding: 0;
      list-style: none;
    }

    .source-links a {
      color: var(--accent);
      text-decoration: none;
    }

    .roadmap-grid {
      display: grid;
      gap: 16px;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 10px 24px rgba(31, 42, 51, 0.07);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 0.85rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status {
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: capitalize;
    }

    .status-planned { background: var(--planned); }
    .status-in_progress { background: var(--progress); }
    .status-blocked { background: var(--blocked); }
    .status-done { background: var(--done); }

    h2 {
      margin: 0 0 10px;
      font-size: 1.25rem;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.5;
    }

    dl {
      display: grid;
      grid-template-columns: max-content 1fr;
      gap: 8px 12px;
      margin: 0 0 14px;
    }

    dt {
      color: var(--muted);
      font-weight: 600;
    }

    dd {
      margin: 0;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    .empty {
      color: var(--muted);
      font-style: italic;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1 id="roadmap-title">Roadmap</h1>
      <div class="meta" id="roadmap-meta"></div>
      <ul class="source-links" id="source-links"></ul>
    </header>
    <section class="roadmap-grid" id="roadmap-items"></section>
  </main>

  <script id="embedded-roadmap-data" type="application/json">
    {
      "roadmap_title": "project-template Delivery Roadmap",
      "last_updated": "2026-03-11",
      "source_links": [
        "../README.md",
        "../milestones",
        "../work_packages",
        "../issues"
      ],
      "items": [
        {
          "id": "RDM-001",
          "title": "Context Bank Baseline",
          "phase": "Build",
          "status": "in_progress",
          "owner": "Program Management",
          "target_date": "2026-04-15",
          "summary": "Align execution artifacts to canonical folder guidance and create the first reusable planning templates.",
          "dependencies": [
            "../milestones",
            "../work_packages"
          ],
          "source_links": [
            "../milestones",
            "../issues"
          ]
        },
        {
          "id": "RDM-002",
          "title": "Requirements Traceability Pass",
          "phase": "Validation",
          "status": "planned",
          "owner": "Systems Engineering",
          "target_date": "2026-05-01",
          "summary": "Cross-link current requirements, execution artifacts, and decisions so planning changes can be traced end to end.",
          "dependencies": [
            "RDM-001",
            "../../03_REQUIREMENTS/system_requirements/requirements.json"
          ],
          "source_links": [
            "../../03_REQUIREMENTS/README.md",
            "../../08_DECISIONS/README.md"
          ]
        },
        {
          "id": "RDM-003",
          "title": "Operational Handoff Package",
          "phase": "Launch",
          "status": "planned",
          "owner": "Operations",
          "target_date": "2026-06-15",
          "summary": "Prepare deployment, release, and support artifacts needed for the first structured handoff.",
          "dependencies": [
            "RDM-002",
            "../../11_OPERATIONS_AND_HANDOFF/README.md"
          ],
          "source_links": [
            "../../11_OPERATIONS_AND_HANDOFF/deployment/README.md",
            "../../11_OPERATIONS_AND_HANDOFF/release_notes/README.md"
          ]
        }
      ]
    }
  </script>

  <script>
    function getEmbeddedRoadmap() {
      const embedded = document.getElementById("embedded-roadmap-data");
      return JSON.parse(embedded.textContent);
    }

    function renderLinks(links) {
      if (!links.length) {
        return '<p class="empty">No linked artifacts.</p>';
      }

      return '<ul>' + links.map((link) => `<li><a href="${link}">${link}</a></li>`).join('') + '</ul>';
    }

    function renderItem(item) {
      return `
        <article class="card">
          <div class="card-top">
            <div>
              <div class="eyebrow">${item.id} | ${item.phase}</div>
              <h2>${item.title}</h2>
            </div>
            <span class="status status-${item.status}">${item.status.replace('_', ' ')}</span>
          </div>
          <p>${item.summary}</p>
          <dl>
            <dt>Owner</dt>
            <dd>${item.owner}</dd>
            <dt>Target</dt>
            <dd>${item.target_date}</dd>
          </dl>
          <strong>Dependencies</strong>
          ${renderLinks(item.dependencies)}
          <strong>Source Links</strong>
          ${renderLinks(item.source_links)}
        </article>
      `;
    }

    async function loadRoadmap() {
      if (window.location.protocol === "file:") {
        return getEmbeddedRoadmap();
      }

      const response = await fetch("./roadmap.json");
      if (!response.ok) {
        throw new Error(`Failed to fetch roadmap.json (${response.status})`);
      }
      return response.json();
    }

    function renderRoadmap(roadmap) {
      document.getElementById("roadmap-title").textContent = roadmap.roadmap_title;
      document.getElementById("roadmap-meta").textContent = `Last updated ${roadmap.last_updated}`;
      document.getElementById("source-links").innerHTML = roadmap.source_links
        .map((link) => `<li><a href="${link}">${link}</a></li>`)
        .join("");
      document.getElementById("roadmap-items").innerHTML = roadmap.items
        .map((item) => renderItem(item))
        .join("");
    }

    loadRoadmap()
      .then((roadmap) => renderRoadmap(roadmap))
      .catch(() => renderRoadmap(getEmbeddedRoadmap()));
  </script>
</body>
</html>
