conventions:
  local_readme: Each folder contains a README.md explaining what belongs there.
  local_agents: Each folder contains an AGENTS.md describing how to draft, update, and cross-link artifacts.
  history_folder: Every generated folder except the root, other than `change_log` folders, contains a ~history/ child for timestamped impact notes.
  change_log_file: Each `change_log` folder keeps a single append-only `change_log.md` file with the newest entry first.
  requirement_traceability: Requirements should link to source, design allocation, validation, and decision history.
