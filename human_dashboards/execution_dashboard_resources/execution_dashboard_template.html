<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Execution Radar</title>
  <style>
    :root {
      --paper: #f4efe4;
      --ink: #1b1a17;
      --muted: #5f5a4f;
      --panel: rgba(255, 251, 242, 0.8);
      --line: rgba(27, 26, 23, 0.14);
      --accent: #c65d2e;
      --planned: #78806a;
      --progress: #2f5f90;
      --blocked: #a43628;
      --done: #2e7a4f;
      --backlog: #7b756a;
      --abandonned: #8c8477;
      --radius: 18px;
      --shadow: 0 16px 40px rgba(46, 37, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(198, 93, 46, 0.13), transparent 28%),
        radial-gradient(circle at top right, rgba(47, 95, 144, 0.14), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, var(--paper) 48%, #efe7d7 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(27, 26, 23, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27, 26, 23, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black, transparent 85%);
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 22px auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 251, 242, 0.68);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .top-controls {
      display: grid;
      gap: 16px;
      margin-bottom: 18px;
      position: relative;
    }

    .top-controls-header {
      min-width: 0;
    }

    .top-controls-filter-row {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero, .meta, .top-controls, .snapshot, .filters, .board, .details, .doc-nav, .doc-viewer {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .hero, .meta, .top-controls, .snapshot, .filters, .board, .details, .doc-nav, .doc-viewer {
      padding: 18px;
    }

    .hero {
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -70px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(198, 93, 46, 0.28), transparent 68%);
    }

    .eyebrow, .stat-label, .filter-label, .micro, .tag, .count-pill, .pill, .doc-meta, .json-key {
      font-family: "Consolas", "Courier New", monospace;
    }

    .eyebrow, .stat-label, .filter-label, .json-key {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .eyebrow { font-size: 12px; letter-spacing: 0.22em; margin-bottom: 10px; }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.95;
      max-width: 10ch;
    }

    h2, h3, p { margin-top: 0; }
    p { color: var(--muted); line-height: 1.6; }

    .stats, .doc-meta-grid {
      display: grid;
      gap: 12px;
    }

    .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .doc-meta-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin: 16px 0; }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(27, 26, 23, 0.08);
    }

    .stat-label { display: block; font-size: 11px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }

    .tabs, .pill-row, .tag-row {
      gap: 10px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      width: 100%;
    }

    .pill-row, .tag-row {
      display: flex;
      flex-wrap: wrap;
    }

    .tab-cluster {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .project-filter-block {
      width: min(320px, 100%);
    }

    .search-filter-block {
      width: min(420px, 100%);
    }

    .top-controls-note {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .top-controls-note strong {
      color: var(--ink);
    }

    .top-controls-note p {
      margin: 0;
    }

    .snapshot { margin-bottom: 18px; }
    .snapshot-compact {
      padding: 14px 16px;
    }
    .snapshot-strip {
      display: grid;
      grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .snapshot-summary {
      display: grid;
      gap: 4px;
      align-content: start;
    }
    .snapshot-summary .eyebrow {
      margin-bottom: 2px;
    }
    .snapshot-title {
      margin: 0;
      font-size: clamp(20px, 2vw, 24px);
      line-height: 1.02;
    }
    .snapshot-secondary {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .snapshot-metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .snapshot-metrics .stat {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
    }
    .snapshot-metrics .stat-label {
      margin-bottom: 6px;
      font-size: 10px;
    }
    .snapshot-metrics .stat-value {
      font-size: clamp(20px, 2.2vw, 24px);
      line-height: 1;
    }
    .filters { margin-bottom: 18px; }

    .tab-button, .doc-link {
      border: 1px solid rgba(27, 26, 23, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .tab-button:hover, .tab-button:focus-visible, .doc-link:hover, .doc-link:focus-visible, .card:hover, .card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(34, 26, 18, 0.1);
      outline: none;
    }

    .tab-button.is-active, .doc-link.is-active {
      color: var(--ink);
      border-color: rgba(198, 93, 46, 0.28);
      background: linear-gradient(135deg, rgba(198, 93, 46, 0.12), rgba(47, 95, 144, 0.08));
    }

    .tab-button {
      min-width: 160px;
      min-height: 52px;
      padding: 10px 14px;
      text-align: left;
    }

    .tab-title { display: block; font-weight: 700; margin-bottom: 4px; }
    .tab-caption { font-size: 13px; line-height: 1.35; }

    .pill, .tag, .count-pill {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(27, 26, 23, 0.06);
      font-size: 12px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .filter-block {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    select, input[type="search"] {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid rgba(27, 26, 23, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
    }

    .warning-strip {
      display: none;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(164, 54, 40, 0.2);
      background: rgba(164, 54, 40, 0.07);
    }

    .warning-strip.is-visible, .tab-panel.is-active { display: block; }
    .tab-panel { display: none; }

    .execution-flow, .doc-layout {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    .doc-layout { grid-template-columns: minmax(260px, 320px) minmax(0, 1fr); }

    .doc-nav { position: sticky; top: 22px; }
    .doc-nav, .doc-viewer, .doc-link { min-width: 0; }

    .execution-details {
      height: clamp(280px, 36vh, 420px);
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      overflow-x: auto;
    }

    .column, .json-entry, .json-card, .json-row-details {
      border-radius: 16px;
      border: 1px solid rgba(27, 26, 23, 0.08);
      background: rgba(255, 255, 255, 0.62);
      padding: 14px;
    }

    .column { min-height: 480px; }
    .column-header, .card-top, .card-meta, .doc-link-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .doc-link-header {
      align-items: flex-start;
      flex-wrap: wrap;
      min-width: 0;
    }

    .column-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .status-chip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-planned { background: var(--planned); }
    .status-in_progress { background: var(--progress); }
    .status-blocked { background: var(--blocked); }
    .status-done { background: var(--done); }
    .status-backlog { background: var(--backlog); }
    .status-abandonned { background: var(--abandonned); }

    .card-stack, .doc-links, .doc-article, .json-object, .json-array, .json-collection-table, .json-row-panel {
      display: grid;
      gap: 12px;
    }

    .doc-links {
      max-height: min(62vh, 760px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .card {
      border: 1px solid rgba(27, 26, 23, 0.1);
      border-left-width: 5px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(34, 26, 18, 0.05);
      text-align: left;
    }

    .card[data-status="planned"] { border-left-color: var(--planned); }
    .card[data-status="in_progress"] { border-left-color: var(--progress); }
    .card[data-status="blocked"] { border-left-color: var(--blocked); }
    .card[data-status="done"] { border-left-color: var(--done); }
    .card[data-status="backlog"] { border-left-color: var(--backlog); }
    .card[data-status="abandonned"] { border-left-color: var(--abandonned); }

    .card-summary {
      margin: 8px 0 0;
      text-align: left;
    }

    .details-summary {
      max-width: 34ch;
      font-size: 17px;
      line-height: 1.65;
      text-wrap: pretty;
    }

    .details-meta-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
    }

    .detail-meta-item {
      min-width: 0;
      flex: 1 1 140px;
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(27, 26, 23, 0.1);
      background: rgba(255, 255, 255, 0.72);
    }

    .detail-meta-item .stat-label {
      margin-bottom: 0;
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .detail-meta-item .micro {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .details-path, .doc-path {
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .details-section, .doc-section {
      padding-top: 14px;
      border-top: 1px solid rgba(27, 26, 23, 0.08);
    }

    .doc-link {
      width: 100%;
      padding: 10px 12px;
      text-align: left;
    }

    .doc-link-title {
      display: block;
      margin: 4px 0;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .doc-link-preview, .json-primitive, .doc-article li, .doc-article p {
      color: #413c34;
      line-height: 1.7;
    }

    .doc-link-title, .doc-link-preview, .doc-meta {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .doc-link-preview {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      line-height: 1.45;
      font-size: 14px;
    }

    .json-entry, .json-card, .json-row-summary, .json-row-panel, .json-key, .json-primitive, .json-column-label, .json-row-index, .json-cell {
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .json-inline-list li {
      min-width: 0;
      max-width: 100%;
      margin: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(27, 26, 23, 0.06);
      font-size: 12px;
      line-height: 1.35;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-object {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .json-entry {
      padding: 12px;
    }

    .json-entry-complex {
      grid-column: 1 / -1;
    }

    .json-entry > .json-key {
      margin-bottom: 6px;
    }

    .json-collection-table {
      gap: 10px;
    }

    .json-collection-head, .json-row-summary {
      display: grid;
      grid-template-columns: 52px repeat(var(--json-column-count, 1), minmax(0, 1fr)) 84px;
      gap: 10px;
      align-items: start;
    }

    .json-collection-table.no-row-index .json-collection-head,
    .json-collection-table.no-row-index .json-row-summary {
      grid-template-columns: repeat(var(--json-column-count, 1), minmax(0, 1fr)) 84px;
    }

    .json-collection-head {
      padding: 0 12px;
    }

    .json-column-label {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .json-column-action {
      text-align: right;
    }

    .json-row-details {
      padding: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.7);
    }

    .json-row-summary {
      padding: 12px 14px;
      cursor: pointer;
      list-style: none;
    }

    .json-row-summary::-webkit-details-marker {
      display: none;
    }

    .json-row-details[open] .json-row-summary {
      border-bottom: 1px solid rgba(27, 26, 23, 0.08);
      background: rgba(198, 93, 46, 0.05);
    }

    .json-row-index, .json-cell-action {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .json-cell {
      min-width: 0;
      color: #413c34;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-cell-action {
      text-align: right;
      color: var(--accent);
    }

    .json-row-panel {
      padding: 12px 14px 14px;
      background: rgba(255, 255, 255, 0.38);
    }

    .doc-article h1 { font-size: 36px; line-height: 1.02; margin: 0; }
    .doc-article h2 { font-size: 26px; line-height: 1.08; margin: 0; }
    .doc-article h3 { font-size: 20px; line-height: 1.15; margin: 0; }

    .doc-article ul, .details-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .doc-article a, .json-entry a, .json-inline-list a, .json-primitive a {
      color: #6d2c13;
      text-decoration: underline;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.16em;
    }

    .doc-article a.unresolved-dashboard-link,
    .json-entry a.unresolved-dashboard-link,
    .json-inline-list a.unresolved-dashboard-link,
    .json-primitive a.unresolved-dashboard-link {
      color: color-mix(in srgb, var(--muted) 82%, var(--ink) 18%);
      text-decoration-line: underline;
      text-decoration-style: dashed;
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.18em;
    }

    .doc-article a.unresolved-dashboard-link:hover,
    .doc-article a.unresolved-dashboard-link:focus-visible,
    .json-entry a.unresolved-dashboard-link:hover,
    .json-entry a.unresolved-dashboard-link:focus-visible,
    .json-inline-list a.unresolved-dashboard-link:hover,
    .json-inline-list a.unresolved-dashboard-link:focus-visible,
    .json-primitive a.unresolved-dashboard-link:hover,
    .json-primitive a.unresolved-dashboard-link:focus-visible {
      color: var(--ink);
    }

    .floating-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      background: rgba(27, 26, 23, 0.08);
    }

    .floating-overlay[data-state="open"] {
      display: block;
    }

    .floating-overlay-panel {
      position: absolute;
      width: min(420px, calc(100vw - 32px));
      padding: 14px 16px;
      border: 1px solid rgba(27, 26, 23, 0.14);
      border-radius: 16px;
      background: rgba(255, 251, 242, 0.96);
      box-shadow: 0 20px 48px rgba(34, 26, 18, 0.18);
      display: grid;
      gap: 12px;
    }

    .floating-overlay-copy {
      min-height: 40px;
      padding: 0 14px 0 12px;
      border-radius: 999px;
      border: 1px solid rgba(27, 26, 23, 0.14);
      background: rgba(255, 255, 255, 0.82);
      color: var(--ink);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      justify-self: end;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.03em;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
    }

    .floating-overlay-copy:hover,
    .floating-overlay-copy:focus-visible {
      transform: translateY(-1px);
      box-shadow: 0 10px 18px rgba(34, 26, 18, 0.12);
      border-color: rgba(198, 93, 46, 0.28);
      outline: none;
    }

    .floating-overlay-copy:active {
      transform: translateY(0) scale(0.97);
    }

    .floating-overlay-copy[data-copy-state="copied"] {
      border-color: rgba(46, 122, 79, 0.34);
      background: rgba(46, 122, 79, 0.12);
      box-shadow: 0 12px 24px rgba(46, 122, 79, 0.16);
      animation: floating-overlay-copy-pulse 320ms ease;
    }

    .floating-overlay-copy[data-copy-state="error"] {
      border-color: rgba(164, 54, 40, 0.34);
      background: rgba(164, 54, 40, 0.1);
      box-shadow: 0 12px 24px rgba(164, 54, 40, 0.14);
    }

    .floating-overlay-copy-label {
      line-height: 1;
      white-space: nowrap;
    }

    .floating-overlay-copy-icon {
      position: relative;
      width: 16px;
      height: 16px;
      flex: 0 0 16px;
    }

    .floating-overlay-copy-icon::before,
    .floating-overlay-copy-icon::after {
      content: "";
      position: absolute;
      width: 10px;
      height: 12px;
      border: 1.4px solid currentColor;
      border-radius: 3px;
      background: rgba(255, 255, 255, 0.9);
    }

    .floating-overlay-copy-icon::before {
      top: 1px;
      left: 4px;
    }

    .floating-overlay-copy-icon::after {
      top: 4px;
      left: 1px;
      background: transparent;
    }

    @keyframes floating-overlay-copy-pulse {
      0% {
        transform: scale(0.96);
      }
      60% {
        transform: scale(1.04);
      }
      100% {
        transform: scale(1);
      }
    }

    .floating-overlay-path {
      margin: 0;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(27, 26, 23, 0.06);
      color: var(--ink);
      font-size: 12px;
      line-height: 1.55;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .doc-article code {
      padding: 1px 5px;
      border-radius: 6px;
      background: rgba(198, 93, 46, 0.1);
      color: #6d2c13;
      font-size: 0.92em;
    }

    .doc-article mark {
      padding: 0 0.18em;
      border-radius: 0.22em;
      background: rgba(198, 93, 46, 0.22);
      color: inherit;
      box-shadow: inset 0 -1px 0 rgba(198, 93, 46, 0.35);
    }

    .doc-article pre, .json-raw {
      margin: 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(27, 26, 23, 0.92);
      color: #f8f1e5;
      overflow-x: auto;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .json-key { display: block; margin-bottom: 8px; font-size: 12px; }

    .is-target {
      outline: 2px solid rgba(198, 93, 46, 0.55);
      box-shadow: 0 0 0 4px rgba(198, 93, 46, 0.12);
    }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed rgba(27, 26, 23, 0.14);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.34);
    }

    @media (max-width: 1180px) {
      .doc-layout { grid-template-columns: 1fr; }
      .doc-nav { position: static; }
      .filters-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .doc-links { max-height: none; }
      .snapshot-strip { grid-template-columns: 1fr; }
      .snapshot-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .top-controls-note {
        position: static;
        text-align: left;
        white-space: normal;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 18px, 100%);
        margin: 9px auto;
        padding: 12px;
      }
      .filters-grid, .doc-meta-grid { grid-template-columns: 1fr; }
      .columns { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .tab-button { min-width: 100%; }
      .execution-details { height: 320px; }
      .snapshot-compact { padding: 12px; }
      .snapshot-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-meta-item { flex-basis: calc(50% - 8px); }
      .json-collection-head { display: none; }
      .json-row-summary {
        grid-template-columns: 1fr;
      }
      .json-cell-action {
        text-align: left;
      }
      .floating-overlay-panel {
        left: 16px !important;
        right: 16px;
        top: 50% !important;
        transform: translateY(-50%);
        width: auto;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="top-controls">
      <div class="top-controls-header">
        <div class="tab-cluster">
          <div class="eyebrow">Sections</div>
          <div class="tabs" id="section-tabs"></div>
        </div>
        <div class="top-controls-note">
          Generated on <strong>__GENERATED_AT__</strong>.
        </div>
      </div>
      <div class="top-controls-filter-row">
        <div class="filter-block project-filter-block">
          <label class="filter-label" for="project-filter">Filter by project</label>
          <select id="project-filter"></select>
        </div>
        <div class="filter-block search-filter-block">
          <label class="filter-label" for="search-filter">Search</label>
          <input id="search-filter" type="search" placeholder="Execution items or section content">
        </div>
      </div>
    </section>

    <section class="tab-panel" id="execution-panel">
      <section class="snapshot snapshot-compact">
        <div class="snapshot-strip">
          <div class="snapshot-summary">
            <div class="eyebrow">Execution Snapshot</div>
            <h2 class="snapshot-title">Execution Snapshot</h2>
          </div>
          <div class="snapshot-secondary">
            <div class="warning-strip" id="warning-strip">
              <div class="warning-text" id="warning-text"></div>
            </div>
            <div class="stats snapshot-metrics">
              <div class="stat">
                <span class="stat-label">Projects</span>
                <span class="stat-value" id="project-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Visible Items</span>
                <span class="stat-value" id="item-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Blocked</span>
                <span class="stat-value" id="blocked-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Due Within 7 Days</span>
                <span class="stat-value" id="due-soon-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Overdue</span>
                <span class="stat-value" id="overdue-count">0</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="filters">
        <div class="filters-grid">
          <div class="filter-block">
            <label class="filter-label" for="status-filter">Filter by status</label>
            <select id="status-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="type-filter">Filter by type</label>
            <select id="type-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="owner-filter">Filter by owner</label>
            <select id="owner-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="priority-filter">Filter by priority</label>
            <select id="priority-filter"></select>
          </div>
        </div>
      </section>

      <section class="execution-flow">
        <aside class="details execution-details" id="details"></aside>
        <div class="board">
          <div class="columns" id="columns"></div>
        </div>
      </section>
    </section>

    <section class="tab-panel is-active" id="document-panel">
      <section class="doc-layout">
        <aside class="doc-nav">
          <div class="eyebrow" id="doc-eyebrow">Section</div>
          <h2 id="doc-section-title">Current Overview</h2>
          <p id="doc-section-description"></p>
          <div class="doc-links" id="doc-links"></div>
        </aside>
        <article class="doc-viewer">
          <div class="doc-article" id="doc-viewer-content"></div>
        </article>
      </section>
    </section>
  </div>
  <div class="floating-overlay" id="unresolved-link-overlay" data-state="closed" data-unresolved-link-overlay>
    <div class="floating-overlay-panel" id="unresolved-link-panel" role="dialog" aria-modal="false" aria-labelledby="unresolved-link-title">
      <button
        type="button"
        class="floating-overlay-copy"
        id="unresolved-link-copy"
        data-unresolved-link-copy
        aria-label="Copy path"
        title="Copy path"
      >
        <span class="floating-overlay-copy-icon" aria-hidden="true">⧉</span>
      </button>
      <div class="eyebrow">Repo Path</div>
      <h3 id="unresolved-link-title">Not available in dashboard</h3>
      <p>This link points to a repo artifact that is not packaged into this dashboard view.</p>
      <p class="floating-overlay-path" id="unresolved-link-path" data-unresolved-link-path></p>
    </div>
  </div>
  <script>
    const DASHBOARD_DATA_RAW = __DASHBOARD_DATA__;
    const DASHBOARD_WARNINGS_RAW = __DASHBOARD_WARNINGS__;
    const WORKSPACE_SECTIONS_RAW = __WORKSPACE_SECTIONS__;
    const STATUS_GROUPS = {
      active: [
        { key: "planned", label: "Planned" },
        { key: "in_progress", label: "In Progress" },
        { key: "blocked", label: "Blocked" },
        { key: "done", label: "Done" }
      ],
      inactive: [
        { key: "backlog", label: "Backlog" },
        { key: "abandonned", label: "Abandonned" },
        { key: "done", label: "Done" }
      ]
    };
    const DEFAULT_STATUS_GROUP = "active";

    function ensureArray(value) {
      if (Array.isArray(value)) {
        return value;
      }
      if (value === null || value === undefined || value === "") {
        return [];
      }
      return [value];
    }

    function normalizeItems(items) {
      return ensureArray(items).map((item) => ({
        ...item,
        dependencies: ensureArray(item.dependencies),
        linked_artifacts: ensureArray(item.linked_artifacts),
        notes: ensureArray(item.notes),
        definition_of_done: ensureArray(item.definition_of_done),
        deliverables: ensureArray(item.deliverables)
      }));
    }

    function normalizeSections(sections) {
      return ensureArray(sections).map((section) => ({
        ...section,
        documents: ensureArray(section.documents).map((document) => ({
          ...document,
          section_key: document.section_key || section.key
        }))
      }));
    }

    const DASHBOARD_DATA = normalizeItems(DASHBOARD_DATA_RAW);
    const DASHBOARD_WARNINGS = ensureArray(DASHBOARD_WARNINGS_RAW);
    const WORKSPACE_SECTIONS = normalizeSections(WORKSPACE_SECTIONS_RAW);
    const DOCUMENTS_BY_ID = new Map();
    const DOCUMENTS_BY_PATH = new Map();
    const EXECUTION_ITEMS_BY_ID = new Map();
    const EXECUTION_ITEMS_BY_PATH = new Map();

    WORKSPACE_SECTIONS.forEach((section) => {
      ensureArray(section.documents).forEach((document) => {
        DOCUMENTS_BY_ID.set(document.id, document);
        DOCUMENTS_BY_PATH.set(normalizePathKey(document.relative_path), document);
      });
    });

    DASHBOARD_DATA.forEach((item) => {
      EXECUTION_ITEMS_BY_ID.set(item.id, item);
      EXECUTION_ITEMS_BY_PATH.set(normalizePathKey(item.relative_path), item);
    });

    const els = {
      sectionTabs: document.getElementById("section-tabs"),
      executionPanel: document.getElementById("execution-panel"),
      documentPanel: document.getElementById("document-panel"),
      projectFilter: document.getElementById("project-filter"),
      statusFilter: document.getElementById("status-filter"),
      typeFilter: document.getElementById("type-filter"),
      ownerFilter: document.getElementById("owner-filter"),
      priorityFilter: document.getElementById("priority-filter"),
      searchFilter: document.getElementById("search-filter"),
      columns: document.getElementById("columns"),
      details: document.getElementById("details"),
      warningStrip: document.getElementById("warning-strip"),
      warningText: document.getElementById("warning-text"),
      projectCount: document.getElementById("project-count"),
      itemCount: document.getElementById("item-count"),
      blockedCount: document.getElementById("blocked-count"),
      dueSoonCount: document.getElementById("due-soon-count"),
      overdueCount: document.getElementById("overdue-count"),
      docEyebrow: document.getElementById("doc-eyebrow"),
      docSectionTitle: document.getElementById("doc-section-title"),
      docSectionDescription: document.getElementById("doc-section-description"),
      docLinks: document.getElementById("doc-links"),
      docViewerContent: document.getElementById("doc-viewer-content"),
      unresolvedLinkOverlay: document.getElementById("unresolved-link-overlay"),
      unresolvedLinkPanel: document.getElementById("unresolved-link-panel"),
      unresolvedLinkPath: document.getElementById("unresolved-link-path"),
      unresolvedLinkCopy: document.getElementById("unresolved-link-copy")
    };

    els.unresolvedLinkCopy.innerHTML = '<span class="floating-overlay-copy-label">Copy path</span><span class="floating-overlay-copy-icon" aria-hidden="true"></span>';
    els.unresolvedLinkCopy.setAttribute("data-copy-state", "idle");

    const state = {
      activeSectionKey: "current_overview",
      selectedId: DASHBOARD_DATA[0] ? DASHBOARD_DATA[0].id : null,
      selectedDocumentIds: {},
      pendingNavigation: null,
      pendingHistoryRestore: null,
      currentNavigationTarget: null,
      ignoreNextHashChange: false,
      unresolvedLinkPath: "",
      unresolvedLinkTrigger: null,
      unresolvedLinkCopyResetTimer: 0
    };
    let pendingHistorySnapshotFrame = 0;

    function titleCase(value) {
      return value.replaceAll("_", " ").replace(/\b\w/g, (match) => match.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizePathKey(value) {
      return String(value || "")
        .trim()
        .replaceAll("\\", "/")
        .replace(/^\.\/+/, "")
        .replace(/^\/+/, "");
    }

    function getDirectoryPath(value) {
      const normalized = normalizePathKey(value);
      const separatorIndex = normalized.lastIndexOf("/");
      return separatorIndex === -1 ? "" : normalized.slice(0, separatorIndex);
    }

    function normalizeJoinedPath(value) {
      const parts = [];
      normalizePathKey(value).split("/").forEach((segment) => {
        if (!segment || segment === ".") {
          return;
        }
        if (segment === "..") {
          if (parts.length) {
            parts.pop();
          }
          return;
        }
        parts.push(segment);
      });
      return parts.join("/");
    }

    function resolveRelativePath(targetPath, baseRelativePath = "") {
      const decodedTarget = decodeURIComponent(String(targetPath || "").trim());
      if (!decodedTarget) {
        return normalizePathKey(baseRelativePath);
      }
      if (/^(?:[a-z]+:|\/\/)/i.test(decodedTarget) || /^[A-Za-z]:[\\/]/.test(decodedTarget)) {
        return "";
      }

      const normalizedTarget = normalizePathKey(decodedTarget);
      if (normalizedTarget.startsWith("projects/")) {
        return normalizeJoinedPath(normalizedTarget);
      }

      const baseDirectory = getDirectoryPath(baseRelativePath);
      return normalizeJoinedPath(baseDirectory ? `${baseDirectory}/${normalizedTarget}` : normalizedTarget);
    }

    function splitRawLinkTarget(rawTarget) {
      const target = String(rawTarget || "").trim();
      if (!target) {
        return null;
      }

      if (/^(?:[a-z]+:|\/\/)/i.test(target) || /^[A-Za-z]:[\\/]/.test(target)) {
        return { external: true, path: target, fragment: "" };
      }

      const hashIndex = target.indexOf("#");
      if (hashIndex === -1) {
        return { external: false, path: target, fragment: "" };
      }

      return {
        external: false,
        path: target.slice(0, hashIndex),
        fragment: decodeURIComponent(target.slice(hashIndex + 1))
      };
    }

    function slugifyHeading(value) {
      return String(value || "")
        .trim()
        .toLowerCase()
        .replace(/[`"'()[\]{}]+/g, "")
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/^-+|-+$/g, "");
    }

    function escapeJsonPointerToken(value) {
      return String(value || "").replaceAll("~", "~0").replaceAll("/", "~1");
    }

    function buildJsonPointer(parentPath, token) {
      const encodedToken = escapeJsonPointerToken(token);
      return parentPath ? `${parentPath}/${encodedToken}` : `/${encodedToken}`;
    }

    function getJsonRecordIdentifiers(value) {
      if (!isJsonObject(value)) {
        return [];
      }

      return ["id", "key", "name", "title", "term"]
        .map((key) => value[key])
        .filter((entry) => entry !== undefined && entry !== null && String(entry).trim())
        .map((entry) => String(entry).trim());
    }

    function jsonContainsRecordIdentifier(value, candidate) {
      if (!candidate) {
        return false;
      }

      if (Array.isArray(value)) {
        return value.some((entry) => jsonContainsRecordIdentifier(entry, candidate));
      }

      if (isJsonObject(value)) {
        if (getJsonRecordIdentifiers(value).includes(candidate)) {
          return true;
        }
        return Object.entries(value).some(([key, entryValue]) =>
          key === candidate || jsonContainsRecordIdentifier(entryValue, candidate)
        );
      }

      return false;
    }

    function findJsonRecordTarget(documentRecord, rawReference, linkLabel = "") {
      if (!documentRecord || documentRecord.format !== "json") {
        return "";
      }

      const fragmentReference = String(rawReference || "").trim();
      if (fragmentReference.startsWith("/")) {
        return fragmentReference;
      }

      const candidates = [fragmentReference, String(linkLabel || "").trim()].filter(Boolean);
      return candidates.find((candidate) => jsonContainsRecordIdentifier(documentRecord.content, candidate)) || "";
    }

    function serializeDashboardHash(target) {
      const params = new URLSearchParams();
      if (target.section) {
        params.set("section", target.section);
      }
      if (target.doc) {
        params.set("doc", target.doc);
      }
      if (target.record) {
        params.set("record", target.record);
      }
      if (target.anchor) {
        params.set("anchor", target.anchor);
      }
      if (target.execution) {
        params.set("execution", target.execution);
      }
      if (target.project) {
        params.set("project", target.project);
      }
      if (target.lifecycle) {
        params.set("lifecycle", target.lifecycle);
      }
      if (target.type) {
        params.set("type", target.type);
      }
      if (target.owner) {
        params.set("owner", target.owner);
      }
      if (target.priority) {
        params.set("priority", target.priority);
      }
      if (target.search) {
        params.set("search", target.search);
      }
      return `#${params.toString()}`;
    }

    function parseDashboardHash(rawHash) {
      const hash = String(rawHash || "").replace(/^#/, "").trim();
      if (!hash || !hash.includes("=")) {
        return null;
      }

      const params = new URLSearchParams(hash);
      const target = {
        section: params.get("section") || "",
        doc: params.get("doc") || "",
        record: params.get("record") || "",
        anchor: params.get("anchor") || "",
        execution: params.get("execution") || "",
        project: params.get("project") || "",
        lifecycle: params.get("lifecycle") || "",
        type: params.get("type") || "",
        owner: params.get("owner") || "",
        priority: params.get("priority") || "",
        search: params.get("search") || ""
      };

      return target.section || target.doc || target.execution ? target : null;
    }

    function getCurrentFilterState() {
      return {
        project: els.projectFilter.value || "",
        lifecycle: els.statusFilter.value || DEFAULT_STATUS_GROUP,
        type: els.typeFilter.value || "",
        owner: els.ownerFilter.value || "",
        priority: els.priorityFilter.value || "",
        search: els.searchFilter.value.trim()
      };
    }

    function applyFilterState(target = {}) {
      els.projectFilter.value = target.project || "";
      els.statusFilter.value = target.lifecycle || DEFAULT_STATUS_GROUP;
      els.typeFilter.value = target.type || "";
      els.ownerFilter.value = target.owner || "";
      els.priorityFilter.value = target.priority || "";
      els.searchFilter.value = target.search || "";
    }

    function normalizeDashboardTarget(target = {}) {
      const filters = getCurrentFilterState();
      return {
        section: String(target.section || ""),
        doc: String(target.doc || ""),
        record: String(target.record || ""),
        anchor: String(target.anchor || ""),
        execution: String(target.execution || ""),
        project: String(target.project ?? filters.project ?? ""),
        lifecycle: String(target.lifecycle ?? filters.lifecycle ?? DEFAULT_STATUS_GROUP),
        type: String(target.type ?? filters.type ?? ""),
        owner: String(target.owner ?? filters.owner ?? ""),
        priority: String(target.priority ?? filters.priority ?? ""),
        search: String(target.search ?? filters.search ?? "")
      };
    }

    function buildCurrentDashboardTarget() {
      const currentTarget = state.currentNavigationTarget || {};
      const filters = getCurrentFilterState();

      if (state.activeSectionKey === "execution_items") {
        return normalizeDashboardTarget({
          ...currentTarget,
          ...filters,
          section: "execution_items",
          execution: state.selectedId || ""
        });
      }

      const section = getSection(state.activeSectionKey) || getSection("current_overview");
      const selectedDocument = getSelectedDocument(section);
      return normalizeDashboardTarget({
        ...currentTarget,
        ...filters,
        section: section ? section.key : "current_overview",
        doc: selectedDocument ? selectedDocument.id : ""
      });
    }

    function buildSectionNavigationTarget(sectionKey) {
      if (sectionKey === "execution_items") {
        const visibleItems = DASHBOARD_DATA.filter(matchesFilters);
        return normalizeDashboardTarget({
          section: "execution_items",
          execution: state.selectedId || (visibleItems[0] ? visibleItems[0].id : "")
        });
      }

      const section = getSection(sectionKey);
      const selectedDocument = getSelectedDocument(section);
      return normalizeDashboardTarget({
        section: section ? section.key : "current_overview",
        doc: selectedDocument ? selectedDocument.id : ""
      });
    }

    function buildHistoryState(target, options = {}) {
      return {
        target: normalizeDashboardTarget(target),
        scrollX: Number.isFinite(options.scrollX) ? options.scrollX : window.scrollX,
        scrollY: Number.isFinite(options.scrollY) ? options.scrollY : window.scrollY
      };
    }

    function syncCurrentHistoryEntry(target = buildCurrentDashboardTarget(), options = {}) {
      const normalizedTarget = normalizeDashboardTarget(target);
      state.currentNavigationTarget = normalizedTarget;
      history.replaceState(
        buildHistoryState(normalizedTarget, options),
        "",
        serializeDashboardHash(normalizedTarget)
      );
    }

    function queueHistorySnapshotSync() {
      if (pendingHistorySnapshotFrame) {
        return;
      }

      pendingHistorySnapshotFrame = window.requestAnimationFrame(() => {
        pendingHistorySnapshotFrame = 0;
        syncCurrentHistoryEntry();
      });
    }

    function restorePendingViewport() {
      const restoreState = state.pendingHistoryRestore;
      if (!restoreState) {
        return;
      }

      window.scrollTo(restoreState.scrollX || 0, restoreState.scrollY || 0);
      state.pendingHistoryRestore = null;
    }

    function resolveDashboardLinkTarget(rawTarget, contextDocument, linkLabel = "") {
      const parts = splitRawLinkTarget(rawTarget);
      if (!parts || parts.external) {
        return null;
      }

      const resolvedPath = parts.path
        ? resolveRelativePath(parts.path, contextDocument ? contextDocument.relative_path : "")
        : (contextDocument ? normalizePathKey(contextDocument.relative_path) : "");

      const targetDocument = resolvedPath ? DOCUMENTS_BY_PATH.get(resolvedPath) : contextDocument || null;
      if (targetDocument) {
        const target = {
          section: targetDocument.section_key,
          doc: targetDocument.id
        };

        if (targetDocument.format === "markdown" && parts.fragment) {
          target.anchor = slugifyHeading(parts.fragment);
        }

        if (targetDocument.format === "json") {
          const recordTarget = findJsonRecordTarget(targetDocument, parts.fragment, linkLabel);
          if (recordTarget) {
            target.record = recordTarget;
          }
        }

        return target;
      }

      if (!resolvedPath) {
        return null;
      }

      const executionItem = EXECUTION_ITEMS_BY_PATH.get(resolvedPath);
      if (!executionItem) {
        return null;
      }

      return {
        section: "execution_items",
        execution: executionItem.id
      };
    }

    function resolveUnresolvedRepoPath(rawTarget, contextDocument) {
      const parts = splitRawLinkTarget(rawTarget);
      if (!parts || parts.external) {
        return "";
      }

      return parts.path
        ? resolveRelativePath(parts.path, contextDocument ? contextDocument.relative_path : "")
        : "";
    }

    function renderDashboardAnchor(contentHtml, target, fallbackHref = "", external = false, unresolvedPath = "") {
      if (!target) {
        if (!fallbackHref || external) {
          return `<a href="${escapeHtml(fallbackHref || "#")}" target="_blank" rel="noreferrer">${contentHtml}</a>`;
        }
        if (unresolvedPath) {
          return `<a href="#unresolved-link" class="unresolved-dashboard-link" data-unresolved-path="${escapeHtml(unresolvedPath)}">${contentHtml}</a>`;
        }
        return `<a href="${escapeHtml(fallbackHref)}">${contentHtml}</a>`;
      }

      return `<a href="${escapeHtml(serializeDashboardHash(target))}" data-dashboard-link="true">${contentHtml}</a>`;
    }

    function renderInlineMarkdown(text, contextDocument) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (match, label, href) => {
          const target = resolveDashboardLinkTarget(href, contextDocument, label);
          const external = Boolean(splitRawLinkTarget(href)?.external);
          const unresolvedPath = target ? "" : resolveUnresolvedRepoPath(href, contextDocument);
          return renderDashboardAnchor(label, target, href, external, unresolvedPath);
        });
    }

    function getSearchValue() {
      return els.searchFilter.value.trim().toLowerCase();
    }

    function collectSearchText(value, parts = []) {
      if (value === null || value === undefined) {
        return parts;
      }

      if (Array.isArray(value)) {
        value.forEach((entry) => collectSearchText(entry, parts));
        return parts;
      }

      if (typeof value === "object") {
        Object.entries(value).forEach(([key, entryValue]) => {
          parts.push(String(key));
          collectSearchText(entryValue, parts);
        });
        return parts;
      }

      parts.push(String(value));
      return parts;
    }

    function getDocumentSearchText(document) {
      return collectSearchText([
        document.title,
        document.preview,
        document.relative_path,
        document.content
      ]).join(" ").toLowerCase();
    }

    function jsonValueMatchesSearch(value, searchValue) {
      if (!searchValue) {
        return true;
      }
      return collectSearchText(value).join(" ").toLowerCase().includes(searchValue);
    }

    function documentMatchesSearch(document) {
      const searchValue = getSearchValue();
      if (!searchValue) {
        return true;
      }
      return getDocumentSearchText(document).includes(searchValue);
    }

    function highlightTextNode(node, searchValue) {
      if (!node || !node.nodeValue) {
        return;
      }

      const text = node.nodeValue;
      const lowerText = text.toLowerCase();
      const matchIndex = lowerText.indexOf(searchValue);
      if (matchIndex === -1) {
        return;
      }

      const fragment = document.createDocumentFragment();
      let start = 0;
      let index = matchIndex;

      while (index !== -1) {
        if (index > start) {
          fragment.appendChild(document.createTextNode(text.slice(start, index)));
        }

        const mark = document.createElement("mark");
        mark.textContent = text.slice(index, index + searchValue.length);
        fragment.appendChild(mark);

        start = index + searchValue.length;
        index = lowerText.indexOf(searchValue, start);
      }

      if (start < text.length) {
        fragment.appendChild(document.createTextNode(text.slice(start)));
      }

      node.parentNode.replaceChild(fragment, node);
    }

    function highlightVisibleTextMatches(container, searchValue) {
      if (!container || !searchValue) {
        return;
      }

      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const parentName = node.parentElement ? node.parentElement.tagName : "";
          if (!node.nodeValue || !node.nodeValue.trim()) {
            return NodeFilter.FILTER_REJECT;
          }
          if (["CODE", "PRE", "MARK", "SCRIPT", "STYLE"].includes(parentName)) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      });

      const textNodes = [];
      while (walker.nextNode()) {
        textNodes.push(walker.currentNode);
      }

      textNodes.forEach((node) => highlightTextNode(node, searchValue));
    }

    function renderMarkdown(source, contextDocument) {
      const lines = String(source || "").replace(/\r\n/g, "\n").split("\n");
      const blocks = [];
      let paragraph = [];
      let listItems = [];
      let codeLines = [];
      let inCode = false;

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }
        blocks.push(`<p>${renderInlineMarkdown(paragraph.join(" "), contextDocument)}</p>`);
        paragraph = [];
      }

      function flushList() {
        if (!listItems.length) {
          return;
        }
        blocks.push(`<ul>${listItems.map((item) => `<li>${renderInlineMarkdown(item, contextDocument)}</li>`).join("")}</ul>`);
        listItems = [];
      }

      function flushCode() {
        if (!codeLines.length) {
          return;
        }
        blocks.push(`<pre>${escapeHtml(codeLines.join("\n"))}</pre>`);
        codeLines = [];
      }

      lines.forEach((line) => {
        if (line.trim().startsWith("```")) {
          flushParagraph();
          flushList();
          if (inCode) {
            flushCode();
          }
          inCode = !inCode;
          return;
        }

        if (inCode) {
          codeLines.push(line);
          return;
        }

        const heading = line.match(/^(#{1,3})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          flushList();
          const level = Math.min(heading[1].length, 3);
          const headingText = heading[2].trim();
          blocks.push(`<h${level} id="${escapeHtml(slugifyHeading(headingText))}">${renderInlineMarkdown(headingText, contextDocument)}</h${level}>`);
          return;
        }

        const listItem = line.match(/^[-*]\s+(.*)$/);
        if (listItem) {
          flushParagraph();
          listItems.push(listItem[1].trim());
          return;
        }

        if (!line.trim()) {
          flushParagraph();
          flushList();
          return;
        }

        paragraph.push(line.trim());
      });

      flushParagraph();
      flushList();
      flushCode();

      return blocks.length ? blocks.join("") : '<div class="empty-state">No Markdown content available.</div>';
    }

    function isJsonObject(value) {
      return Boolean(value) && !Array.isArray(value) && typeof value === "object";
    }

    function isPrimitiveJsonValue(value) {
      return value === null || value === undefined || typeof value !== "object";
    }

    function isStructuredJsonValue(value) {
      return Array.isArray(value) || isJsonObject(value);
    }

    function summarizeJsonValue(value) {
      if (value === null || value === undefined || value === "") {
        return "-";
      }

      if (Array.isArray(value)) {
        if (!value.length) {
          return "[]";
        }

        const primitiveValues = value.every(isPrimitiveJsonValue);
        if (primitiveValues) {
          const preview = value.slice(0, 3).map((entry) => String(entry)).join(", ");
          return value.length > 3 ? `${preview} +${value.length - 3}` : preview;
        }

        return `${value.length} entries`;
      }

      if (isJsonObject(value)) {
        const recordLabel = value.id || value.title || value.name || value.key;
        if (recordLabel !== undefined && recordLabel !== null && recordLabel !== "") {
          return String(recordLabel);
        }
        return `${Object.keys(value).length} fields`;
      }

      return String(value);
    }

    function getJsonScanColumns(entries) {
      const priority = [
        "id",
        "title",
        "name",
        "description",
        "change_summary",
        "status",
        "owner",
        "summary",
        "target_date",
        "date",
        "last_updated"
      ];
      const frequency = new Map();

      entries.forEach((entry) => {
        if (!isJsonObject(entry)) {
          return;
        }

        Object.keys(entry).forEach((key) => {
          frequency.set(key, (frequency.get(key) || 0) + 1);
        });
      });

      return [...frequency.entries()]
        .filter(([key]) => !["row", "notes", "linked_artifacts", "dependencies"].includes(key))
        .sort((left, right) => {
          const [leftKey, leftCount] = left;
          const [rightKey, rightCount] = right;
          const leftPriority = priority.indexOf(leftKey);
          const rightPriority = priority.indexOf(rightKey);

          if (leftPriority !== -1 || rightPriority !== -1) {
            if (leftPriority === -1) {
              return 1;
            }
            if (rightPriority === -1) {
              return -1;
            }
            if (leftPriority !== rightPriority) {
              return leftPriority - rightPriority;
            }
          }

          if (leftCount !== rightCount) {
            return rightCount - leftCount;
          }

          return leftKey.localeCompare(rightKey);
        })
        .slice(0, 4)
        .map(([key]) => key);
    }

    function isGlossaryCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "term") &&
        Object.prototype.hasOwnProperty.call(entry, "definition")
      );
    }

    function isStakeholderCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "id") &&
        Object.prototype.hasOwnProperty.call(entry, "name") &&
        Object.prototype.hasOwnProperty.call(entry, "affiliation") &&
        Object.prototype.hasOwnProperty.call(entry, "role")
      );
    }

    function isRequirementCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "id") &&
        Object.prototype.hasOwnProperty.call(entry, "statement") &&
        Object.prototype.hasOwnProperty.call(entry, "status") &&
        Object.prototype.hasOwnProperty.call(entry, "date_of_last_update")
      );
    }

    function getJsonCollectionConfig(entries) {
      if (isGlossaryCollection(entries)) {
        return {
          columns: ["id", "term", "definition"],
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      if (isRequirementCollection(entries)) {
        return {
          columns: ["id", "statement", "status", "date_of_last_update"],
          labels: {
            id: "ID",
            statement: "Statement",
            status: "Status",
            date_of_last_update: "Date of last update"
          },
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      if (isStakeholderCollection(entries)) {
        return {
          columns: ["id", "name", "affiliation", "role"],
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      return {
        columns: getJsonScanColumns(entries),
        showRowIndex: false,
        actionLabel: "Inspect"
      };
    }

    function renderJsonPrimitiveValue(value, contextDocument) {
      if (typeof value === "string") {
        const target = resolveDashboardLinkTarget(value, contextDocument);
        const unresolvedPath = target ? "" : resolveUnresolvedRepoPath(value, contextDocument);
        if (target || unresolvedPath) {
          return renderDashboardAnchor(escapeHtml(value), target, value, false, unresolvedPath);
        }
      }

      return escapeHtml(value);
    }

    function positionUnresolvedOverlay(trigger) {
      const panel = els.unresolvedLinkPanel;
      if (!panel) {
        return;
      }

      if (!trigger || window.innerWidth <= 720) {
        panel.style.left = "16px";
        panel.style.top = "50%";
        panel.style.transform = "translateY(-50%)";
        return;
      }

      panel.style.transform = "";
      const rect = trigger.getBoundingClientRect();
      const panelWidth = panel.offsetWidth || 420;
      const panelHeight = panel.offsetHeight || 220;
      const margin = 16;
      const left = Math.min(
        Math.max(margin, rect.left),
        Math.max(margin, window.innerWidth - panelWidth - margin)
      );
      const maxTop = Math.max(margin, window.innerHeight - panelHeight - margin);
      const desiredTop = rect.bottom + 12;
      const top = desiredTop <= maxTop ? desiredTop : Math.max(margin, rect.top - panelHeight - 12);
      panel.style.left = `${left}px`;
      panel.style.top = `${top}px`;
    }

    function openUnresolvedLinkOverlay(path, trigger) {
      resetUnresolvedLinkCopyState();
      state.unresolvedLinkPath = String(path || "");
      state.unresolvedLinkTrigger = trigger || null;
      els.unresolvedLinkPath.textContent = state.unresolvedLinkPath;
      els.unresolvedLinkOverlay.setAttribute("data-state", "open");
      positionUnresolvedOverlay(trigger);
      els.unresolvedLinkCopy.focus({ preventScroll: true });
    }

    function closeUnresolvedLinkOverlay() {
      if (!els.unresolvedLinkOverlay || els.unresolvedLinkOverlay.getAttribute("data-state") !== "open") {
        return;
      }

      resetUnresolvedLinkCopyState();
      els.unresolvedLinkOverlay.setAttribute("data-state", "closed");
      els.unresolvedLinkPath.textContent = "";
      const trigger = state.unresolvedLinkTrigger;
      state.unresolvedLinkPath = "";
      state.unresolvedLinkTrigger = null;
      if (trigger && typeof trigger.focus === "function") {
        trigger.focus({ preventScroll: true });
      }
    }

    function resetUnresolvedLinkCopyState() {
      if (state.unresolvedLinkCopyResetTimer) {
        window.clearTimeout(state.unresolvedLinkCopyResetTimer);
        state.unresolvedLinkCopyResetTimer = 0;
      }
      els.unresolvedLinkCopy.setAttribute("data-copy-state", "idle");
    }

    function setUnresolvedLinkCopyState(nextState) {
      els.unresolvedLinkCopy.setAttribute("data-copy-state", nextState);
      if (state.unresolvedLinkCopyResetTimer) {
        window.clearTimeout(state.unresolvedLinkCopyResetTimer);
      }
      state.unresolvedLinkCopyResetTimer = window.setTimeout(() => {
        els.unresolvedLinkCopy.setAttribute("data-copy-state", "idle");
        state.unresolvedLinkCopyResetTimer = 0;
      }, 1200);
    }

    function copyTextToClipboard(value) {
      const text = String(value || "");
      if (!text) {
        return Promise.resolve(false);
      }

      if (navigator.clipboard && typeof navigator.clipboard.writeText === "function") {
        return navigator.clipboard.writeText(text).then(() => true).catch(() => false);
      }

      const helper = document.createElement("textarea");
      helper.value = text;
      helper.setAttribute("readonly", "readonly");
      helper.style.position = "fixed";
      helper.style.opacity = "0";
      document.body.appendChild(helper);
      helper.select();
      let copied = false;
      try {
        copied = document.execCommand("copy");
      } catch (error) {
        copied = false;
      }
      helper.remove();
      return Promise.resolve(copied);
    }

    function renderPrimitiveList(values, options = {}) {
      return `<ul class="json-inline-list">${values.map((entry) => `<li>${renderJsonPrimitiveValue(entry, options.contextDocument)}</li>`).join("")}</ul>`;
    }

    function renderJsonObjectEntries(value, options = {}) {
      const { depth = 0, searchValue = "", jsonPath = "", contextDocument = null } = options;
      const entries = Object.entries(value)
        .filter(([key]) => key !== "row")
        .filter(([key, entryValue]) => depth !== 0 || !searchValue || jsonValueMatchesSearch([key, entryValue], searchValue));
      return entries.length
        ? `<div class="json-object">${entries.map(([key, entryValue]) => `
            <div class="json-entry${isStructuredJsonValue(entryValue) ? " json-entry-complex" : ""}" data-json-path="${escapeHtml(buildJsonPointer(jsonPath, key))}"${getJsonRecordIdentifiers(entryValue)[0] ? ` data-json-record-id="${escapeHtml(getJsonRecordIdentifiers(entryValue)[0])}"` : ""}>
              <span class="json-key">${escapeHtml(key)}</span>
              ${renderJsonValue(entryValue, { depth: depth + 1, searchValue, jsonPath: buildJsonPointer(jsonPath, key), contextDocument })}
            </div>
          `).join("")}</div>`
        : '<div class="json-primitive">{}</div>';
    }

    function renderJsonCompactCollection(entries, options = {}) {
      const { columns, labels = {}, showRowIndex, actionLabel } = getJsonCollectionConfig(entries);
      const cellsTemplate = columns.length
        ? columns.map((key) => `<span class="json-column-label">${escapeHtml(labels[key] || titleCase(key))}</span>`).join("")
        : '<span class="json-column-label">Value</span>';
      const columnCount = columns.length || 1;
      const tableClass = showRowIndex ? "json-collection-table" : "json-collection-table no-row-index";
      const rowHeader = showRowIndex ? '<span class="json-column-label">Row</span>' : "";

      return `
        <div class="${tableClass}" style="--json-column-count:${columnCount}">
          <div class="json-collection-head">
            ${rowHeader}
            ${cellsTemplate}
            <span class="json-column-label json-column-action">${escapeHtml(actionLabel)}</span>
          </div>
          ${entries.map((entry, index) => {
            const itemPath = buildJsonPointer(options.jsonPath || "", String(index));
            const recordId = getJsonRecordIdentifiers(entry)[0] || "";
            const summaryCells = columns.length
              ? columns.map((key) => `<span class="json-cell">${escapeHtml(summarizeJsonValue(entry[key]))}</span>`).join("")
              : `<span class="json-cell">${escapeHtml(summarizeJsonValue(entry))}</span>`;
            const detailContent = isJsonObject(entry)
              ? renderJsonObjectEntries(entry, { depth: options.depth + 1, searchValue: options.searchValue, jsonPath: itemPath, contextDocument: options.contextDocument })
              : renderJsonValue(entry, { depth: options.depth + 1, searchValue: options.searchValue, jsonPath: itemPath, contextDocument: options.contextDocument });
            return `
              <details class="json-row-details" data-json-path="${escapeHtml(itemPath)}"${recordId ? ` data-json-record-id="${escapeHtml(recordId)}"` : ""}>
                <summary class="json-row-summary">
                  ${showRowIndex ? `<span class="json-row-index">${index + 1}</span>` : ""}
                  ${summaryCells}
                  <span class="json-cell json-cell-action">${escapeHtml(actionLabel)}</span>
                </summary>
                <div class="json-row-panel">
                  ${detailContent}
                </div>
              </details>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderJsonValue(value, options = {}) {
      const { depth = 0, searchValue = "", jsonPath = "", contextDocument = null } = options;
      if (value === null || value === undefined) {
        return '<div class="json-primitive">null</div>';
      }

      if (Array.isArray(value)) {
        const visibleItems = depth === 0 && searchValue
          ? value.filter((entry) => jsonValueMatchesSearch(entry, searchValue))
          : value;
        if (!visibleItems.length) {
          return '<div class="json-primitive">[]</div>';
        }

        const allPrimitive = visibleItems.every((entry) => entry === null || typeof entry !== "object");
        if (allPrimitive) {
          return renderPrimitiveList(visibleItems, { contextDocument });
        }

        if (visibleItems.every((entry) => isJsonObject(entry))) {
          return renderJsonCompactCollection(visibleItems, { depth, searchValue, jsonPath, contextDocument });
        }

        return `<div class="json-array">${visibleItems.map((entry, index) => `
          <div class="json-card" data-json-path="${escapeHtml(buildJsonPointer(jsonPath, String(index)))}">
            <span class="json-key">Item ${index + 1}</span>
            ${renderJsonValue(entry, { depth: depth + 1, searchValue, jsonPath: buildJsonPointer(jsonPath, String(index)), contextDocument })}
          </div>
        `).join("")}</div>`;
      }

      if (typeof value === "object") {
        return renderJsonObjectEntries(value, { depth, searchValue, jsonPath, contextDocument });
      }

      return `<div class="json-primitive">${renderJsonPrimitiveValue(value, contextDocument)}</div>`;
    }

    function getSection(sectionKey) {
      return WORKSPACE_SECTIONS.find((section) => section.key === sectionKey) || null;
    }

    function getSelectedDocument(section) {
      if (!section || section.type !== "documents") {
        return null;
      }
      const documents = getVisibleDocuments(section);
      const selectedId = state.selectedDocumentIds[section.key];
      return documents.find((document) => document.id === selectedId) || documents[0] || null;
    }

    function parseDateValue(value) {
      if (!value) {
        return null;
      }
      const parsed = new Date(`${value}T00:00:00`);
      return Number.isNaN(parsed.valueOf()) ? null : parsed;
    }

    function isRecentlyDone(item) {
      if (item.status !== "done") {
        return false;
      }

      const completedAt = parseDateValue(item.completion_date) || parseDateValue(item.target_date);
      if (!completedAt) {
        return true;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diffDays = Math.floor((today - completedAt) / 86400000);
      return diffDays <= 14;
    }

    function getLifecycleGroup(item) {
      if (item.status === "planned" || item.status === "in_progress" || item.status === "blocked") {
        return "active";
      }
      if (item.status === "backlog" || item.status === "abandonned") {
        return "inactive";
      }
      if (item.status === "done") {
        return isRecentlyDone(item) ? "active" : "inactive";
      }
      return "";
    }

    function getSelectedStatusGroup() {
      return els.statusFilter.value || "active";
    }

    function getVisibleStatusColumns() {
      return STATUS_GROUPS[getSelectedStatusGroup()] || STATUS_GROUPS.active;
    }

    function isDueSoon(item) {
      if (!item.target_date || item.status === "done" || item.status === "backlog" || item.status === "abandonned") {
        return false;
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseDateValue(item.target_date);
      if (!target) {
        return false;
      }
      const diffDays = Math.floor((target - today) / 86400000);
      return diffDays >= 0 && diffDays <= 7;
    }

    function isOverdue(item) {
      if (!item.target_date || item.status === "done" || item.status === "backlog" || item.status === "abandonned") {
        return false;
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseDateValue(item.target_date);
      if (!target) {
        return false;
      }
      const diffDays = Math.floor((target - today) / 86400000);
      return diffDays < 0;
    }

    function buildProjectOptions() {
      const values = [...new Set([
        ...DASHBOARD_DATA.map((item) => item.project_id),
        ...WORKSPACE_SECTIONS.flatMap((section) => ensureArray(section.documents).map((document) => document.project_id))
      ].filter(Boolean))].sort((a, b) => a.localeCompare(b));

      return [{ value: "", label: "All projects" }, ...values.map((value) => ({ value, label: titleCase(value) }))];
    }

    function buildOptions(items, key, fallbackLabel) {
      const values = [...new Set(items.map((item) => item[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      return [{ value: "", label: fallbackLabel }, ...values.map((value) => ({ value, label: titleCase(value) }))];
    }

    function fillSelect(select, options) {
      select.innerHTML = "";
      options.forEach((option) => {
        const element = document.createElement("option");
        element.value = option.value;
        element.textContent = option.label;
        select.appendChild(element);
      });
    }

    function matchesProjectSelection(projectId) {
      return !els.projectFilter.value || projectId === els.projectFilter.value;
    }

    function getVisibleDocuments(section) {
      if (!section || section.type !== "documents") {
        return [];
      }
      return section.documents.filter((document) =>
        matchesProjectSelection(document.project_id) &&
        documentMatchesSearch(document)
      );
    }

    function getProjectScopedExecutionItems() {
      return DASHBOARD_DATA.filter((item) => matchesProjectSelection(item.project_id));
    }

    function getVisibleExecutionItems() {
      return getProjectScopedExecutionItems().filter((item) => getLifecycleGroup(item) === getSelectedStatusGroup());
    }

    function matchesFilters(item) {
      const searchValue = getSearchValue();
      if (getLifecycleGroup(item) !== getSelectedStatusGroup()) {
        return false;
      }
      if (!matchesProjectSelection(item.project_id)) {
        return false;
      }
      if (els.typeFilter.value && item.type !== els.typeFilter.value) {
        return false;
      }
      if (els.ownerFilter.value && item.owner !== els.ownerFilter.value) {
        return false;
      }
      if (els.priorityFilter.value && item.priority !== els.priorityFilter.value) {
        return false;
      }
      if (!searchValue) {
        return true;
      }
      return [item.id, item.title, item.summary, item.project_id, item.owner]
        .filter(Boolean)
        .some((value) => value.toLowerCase().includes(searchValue));
    }

    function renderCard(item) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "card";
      card.dataset.status = item.status;
      card.dataset.itemId = item.id;
      card.innerHTML = `
        <div class="card-top">
          <span class="micro">${item.id}</span>
          <span class="micro">${item.project_id}</span>
        </div>
        <div style="font-size:20px;line-height:1.1;font-weight:700;">${escapeHtml(item.title)}</div>
        <p class="card-summary">${escapeHtml(item.summary || "No summary provided.")}</p>
        <div class="tag-row">

    function renderDetails(item) {
      if (!item) {
        els.details.innerHTML = `

      const focusList = item.type === "milestone" ? item.deliverables : item.definition_of_done;
      const focusLabel = item.type === "milestone" ? "Deliverables" : "Definition of Done";
      const dependencies = item.dependencies.length
        ? `<ul>${item.dependencies.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`

        ? `<ul>${focusList.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`

        ? `<ul>${item.notes.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`
