<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Execution Radar</title>
  <style>
    :root {
      --paper: #f4efe4;
      --ink: #1b1a17;
      --muted: #5f5a4f;
      --panel: rgba(255, 251, 242, 0.8);
      --line: rgba(27, 26, 23, 0.14);
      --accent: #c65d2e;
      --planned: #78806a;
      --progress: #2f5f90;
      --blocked: #a43628;
      --done: #2e7a4f;
      --backlog: #7b756a;
      --abandonned: #8c8477;
      --radius: 18px;
      --shadow: 0 16px 40px rgba(46, 37, 24, 0.12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Georgia", "Times New Roman", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(198, 93, 46, 0.13), transparent 28%),
        radial-gradient(circle at top right, rgba(47, 95, 144, 0.14), transparent 24%),
        linear-gradient(180deg, #fbf7ef 0%, var(--paper) 48%, #efe7d7 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(27, 26, 23, 0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(27, 26, 23, 0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: radial-gradient(circle at center, black, transparent 85%);
    }

    button, input, select { font: inherit; }

    .shell {
      width: min(1480px, calc(100vw - 32px));
      margin: 22px auto;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 28px;
      background: rgba(255, 251, 242, 0.68);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .top-controls {
      display: grid;
      gap: 16px;
      margin-bottom: 18px;
      position: relative;
    }

    .top-controls-header {
      min-width: 0;
    }

    .top-controls-filter-row {
      display: flex;
      justify-content: flex-start;
      gap: 10px;
      flex-wrap: wrap;
    }

    .hero, .meta, .top-controls, .snapshot, .filters, .board, .details, .doc-nav, .doc-viewer {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.4);
    }

    .hero, .meta, .top-controls, .snapshot, .filters, .board, .details, .doc-nav, .doc-viewer {
      padding: 18px;
    }

    .hero {
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      right: -60px;
      top: -70px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(198, 93, 46, 0.28), transparent 68%);
    }

    .eyebrow, .stat-label, .filter-label, .micro, .tag, .count-pill, .pill, .doc-meta, .json-key {
      font-family: "Consolas", "Courier New", monospace;
    }

    .eyebrow, .stat-label, .filter-label, .json-key {
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
    }

    .eyebrow { font-size: 12px; letter-spacing: 0.22em; margin-bottom: 10px; }

    h1 {
      margin: 0;
      font-size: clamp(34px, 5vw, 62px);
      line-height: 0.95;
      max-width: 10ch;
    }

    h2, h3, p { margin-top: 0; }
    p { color: var(--muted); line-height: 1.6; }

    .stats, .doc-meta-grid {
      display: grid;
      gap: 12px;
    }

    .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .doc-meta-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); margin: 16px 0; }

    .stat {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.56);
      border: 1px solid rgba(27, 26, 23, 0.08);
    }

    .stat-label { display: block; font-size: 11px; margin-bottom: 8px; }
    .stat-value { font-size: 28px; font-weight: 700; }

    .tabs, .pill-row, .tag-row {
      gap: 10px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      width: 100%;
    }

    .pill-row, .tag-row {
      display: flex;
      flex-wrap: wrap;
    }

    .tab-cluster {
      display: grid;
      gap: 10px;
      min-width: 0;
    }

    .project-filter-block {
      width: min(320px, 100%);
    }

    .search-filter-block {
      width: min(420px, 100%);
    }

    .top-controls-note {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 13px;
      line-height: 1.4;
      color: var(--muted);
      text-align: right;
      white-space: nowrap;
    }

    .top-controls-note strong {
      color: var(--ink);
    }

    .top-controls-note p {
      margin: 0;
    }

    .snapshot { margin-bottom: 18px; }
    .snapshot-compact {
      padding: 14px 16px;
    }
    .snapshot-strip {
      display: grid;
      grid-template-columns: minmax(180px, 220px) minmax(0, 1fr);
      gap: 14px;
      align-items: start;
    }
    .snapshot-summary {
      display: grid;
      gap: 4px;
      align-content: start;
    }
    .snapshot-summary .eyebrow {
      margin-bottom: 2px;
    }
    .snapshot-title {
      margin: 0;
      font-size: clamp(20px, 2vw, 24px);
      line-height: 1.02;
    }
    .snapshot-secondary {
      display: grid;
      gap: 10px;
      min-width: 0;
    }
    .snapshot-metrics {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }
    .snapshot-metrics .stat {
      min-width: 0;
      padding: 10px 12px;
      border-radius: 14px;
    }
    .snapshot-metrics .stat-label {
      margin-bottom: 6px;
      font-size: 10px;
    }
    .snapshot-metrics .stat-value {
      font-size: clamp(20px, 2.2vw, 24px);
      line-height: 1;
    }
    .filters { margin-bottom: 18px; }

    .tab-button, .doc-link {
      border: 1px solid rgba(27, 26, 23, 0.1);
      border-radius: 14px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--muted);
      cursor: pointer;
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease;
    }

    .tab-button:hover, .tab-button:focus-visible, .doc-link:hover, .doc-link:focus-visible, .card:hover, .card:focus-visible {
      transform: translateY(-2px);
      box-shadow: 0 12px 22px rgba(34, 26, 18, 0.1);
      outline: none;
    }

    .tab-button.is-active, .doc-link.is-active {
      color: var(--ink);
      border-color: rgba(198, 93, 46, 0.28);
      background: linear-gradient(135deg, rgba(198, 93, 46, 0.12), rgba(47, 95, 144, 0.08));
    }

    .tab-button {
      min-width: 160px;
      min-height: 52px;
      padding: 10px 14px;
      text-align: left;
    }

    .tab-title { display: block; font-weight: 700; margin-bottom: 4px; }
    .tab-caption { font-size: 13px; line-height: 1.35; }

    .pill, .tag, .count-pill {
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(27, 26, 23, 0.06);
      font-size: 12px;
    }

    .filters-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
      align-items: end;
    }

    .filter-block {
      display: grid;
      gap: 6px;
      min-width: 0;
    }

    select, input[type="search"] {
      width: 100%;
      height: 42px;
      padding: 0 12px;
      border: 1px solid rgba(27, 26, 23, 0.12);
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
    }

    .warning-strip {
      display: none;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(164, 54, 40, 0.2);
      background: rgba(164, 54, 40, 0.07);
    }

    .warning-strip.is-visible, .tab-panel.is-active { display: block; }
    .tab-panel { display: none; }

    .execution-flow, .doc-layout {
      display: grid;
      gap: 18px;
      align-items: start;
    }

    .doc-layout { grid-template-columns: minmax(260px, 320px) minmax(0, 1fr); }

    .doc-nav { position: sticky; top: 22px; }
    .doc-nav, .doc-viewer, .doc-link { min-width: 0; }

    .execution-details {
      height: clamp(280px, 36vh, 420px);
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(240px, 1fr));
      gap: 14px;
      overflow-x: auto;
    }

    .column, .json-entry, .json-card, .json-row-details {
      border-radius: 16px;
      border: 1px solid rgba(27, 26, 23, 0.08);
      background: rgba(255, 255, 255, 0.62);
      padding: 14px;
    }

    .column { min-height: 480px; }
    .column-header, .card-top, .card-meta, .doc-link-header {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: baseline;
    }

    .doc-link-header {
      align-items: flex-start;
      flex-wrap: wrap;
      min-width: 0;
    }

    .column-title {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 18px;
      font-weight: 700;
    }

    .status-chip {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
    }

    .status-planned { background: var(--planned); }
    .status-in_progress { background: var(--progress); }
    .status-blocked { background: var(--blocked); }
    .status-done { background: var(--done); }
    .status-backlog { background: var(--backlog); }
    .status-abandonned { background: var(--abandonned); }

    .card-stack, .doc-links, .doc-article, .json-object, .json-array, .json-collection-table, .json-row-panel {
      display: grid;
      gap: 12px;
    }

    .doc-links {
      max-height: min(62vh, 760px);
      overflow-y: auto;
      padding-right: 4px;
    }

    .card {
      border: 1px solid rgba(27, 26, 23, 0.1);
      border-left-width: 5px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.86);
      padding: 14px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(34, 26, 18, 0.05);
      text-align: left;
    }

    .card[data-status="planned"] { border-left-color: var(--planned); }
    .card[data-status="in_progress"] { border-left-color: var(--progress); }
    .card[data-status="blocked"] { border-left-color: var(--blocked); }
    .card[data-status="done"] { border-left-color: var(--done); }
    .card[data-status="backlog"] { border-left-color: var(--backlog); }
    .card[data-status="abandonned"] { border-left-color: var(--abandonned); }

    .card-summary {
      margin: 8px 0 0;
      text-align: left;
    }

    .details-summary {
      max-width: 34ch;
      font-size: 17px;
      line-height: 1.65;
      text-wrap: pretty;
    }

    .details-meta-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin: 0 0 18px;
    }

    .detail-meta-item {
      min-width: 0;
      flex: 1 1 140px;
      display: inline-flex;
      align-items: baseline;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      border: 1px solid rgba(27, 26, 23, 0.1);
      background: rgba(255, 255, 255, 0.72);
    }

    .detail-meta-item .stat-label {
      margin-bottom: 0;
      font-size: 10px;
      letter-spacing: 0.08em;
    }

    .detail-meta-item .micro {
      color: var(--ink);
      font-size: 13px;
      line-height: 1.25;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .details-path, .doc-path {
      font-size: 12px;
      line-height: 1.6;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .details-section, .doc-section {
      padding-top: 14px;
      border-top: 1px solid rgba(27, 26, 23, 0.08);
    }

    .doc-link {
      width: 100%;
      padding: 10px 12px;
      text-align: left;
    }

    .doc-link-title {
      display: block;
      margin: 4px 0;
      font-weight: 700;
      color: var(--ink);
      line-height: 1.35;
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .doc-link-preview, .json-primitive, .doc-article li, .doc-article p {
      color: #413c34;
      line-height: 1.7;
    }

    .doc-link-title, .doc-link-preview, .doc-meta {
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .doc-link-preview {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
      line-height: 1.45;
      font-size: 14px;
    }

    .json-entry, .json-card, .json-row-summary, .json-row-panel, .json-key, .json-primitive, .json-column-label, .json-row-index, .json-cell {
      min-width: 0;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-inline-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-width: 0;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .json-inline-list li {
      min-width: 0;
      max-width: 100%;
      margin: 0;
      padding: 4px 8px;
      border-radius: 999px;
      background: rgba(27, 26, 23, 0.06);
      font-size: 12px;
      line-height: 1.35;
      white-space: normal;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-object {
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    }

    .json-entry {
      padding: 12px;
    }

    .json-entry-complex {
      grid-column: 1 / -1;
    }

    .json-entry > .json-key {
      margin-bottom: 6px;
    }

    .json-collection-table {
      gap: 10px;
    }

    .json-collection-head, .json-row-summary {
      display: grid;
      grid-template-columns: 52px repeat(var(--json-column-count, 1), minmax(0, 1fr)) 84px;
      gap: 10px;
      align-items: start;
    }

    .json-collection-table.no-row-index .json-collection-head,
    .json-collection-table.no-row-index .json-row-summary {
      grid-template-columns: repeat(var(--json-column-count, 1), minmax(0, 1fr)) 84px;
    }

    .json-collection-head {
      padding: 0 12px;
    }

    .json-column-label {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .json-column-action {
      text-align: right;
    }

    .json-row-details {
      padding: 0;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.7);
    }

    .json-row-summary {
      padding: 12px 14px;
      cursor: pointer;
      list-style: none;
    }

    .json-row-summary::-webkit-details-marker {
      display: none;
    }

    .json-row-details[open] .json-row-summary {
      border-bottom: 1px solid rgba(27, 26, 23, 0.08);
      background: rgba(198, 93, 46, 0.05);
    }

    .json-row-index, .json-cell-action {
      font-family: "Consolas", "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .json-cell {
      min-width: 0;
      color: #413c34;
      line-height: 1.45;
      overflow-wrap: anywhere;
      word-break: break-word;
    }

    .json-cell-action {
      text-align: right;
      color: var(--accent);
    }

    .json-row-panel {
      padding: 12px 14px 14px;
      background: rgba(255, 255, 255, 0.38);
    }

    .doc-article h1 { font-size: 36px; line-height: 1.02; margin: 0; }
    .doc-article h2 { font-size: 26px; line-height: 1.08; margin: 0; }
    .doc-article h3 { font-size: 20px; line-height: 1.15; margin: 0; }

    .doc-article ul, .details-section ul {
      margin: 0;
      padding-left: 18px;
    }

    .doc-article code {
      padding: 1px 5px;
      border-radius: 6px;
      background: rgba(198, 93, 46, 0.1);
      color: #6d2c13;
      font-size: 0.92em;
    }

    .doc-article mark {
      padding: 0 0.18em;
      border-radius: 0.22em;
      background: rgba(198, 93, 46, 0.22);
      color: inherit;
      box-shadow: inset 0 -1px 0 rgba(198, 93, 46, 0.35);
    }

    .doc-article pre, .json-raw {
      margin: 0;
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(27, 26, 23, 0.92);
      color: #f8f1e5;
      overflow-x: auto;
      font-family: "Consolas", "Courier New", monospace;
      font-size: 13px;
      line-height: 1.6;
    }

    .json-key { display: block; margin-bottom: 8px; font-size: 12px; }

    .empty-state {
      padding: 18px;
      border-radius: 16px;
      border: 1px dashed rgba(27, 26, 23, 0.14);
      color: var(--muted);
      background: rgba(255, 255, 255, 0.34);
    }

    @media (max-width: 1180px) {
      .doc-layout { grid-template-columns: 1fr; }
      .doc-nav { position: static; }
      .filters-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .doc-links { max-height: none; }
      .snapshot-strip { grid-template-columns: 1fr; }
      .snapshot-metrics { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .top-controls-note {
        position: static;
        text-align: left;
        white-space: normal;
      }
    }

    @media (max-width: 720px) {
      .shell {
        width: min(100vw - 18px, 100%);
        margin: 9px auto;
        padding: 12px;
      }
      .filters-grid, .doc-meta-grid { grid-template-columns: 1fr; }
      .columns { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: 1fr; }
      .tab-button { min-width: 100%; }
      .execution-details { height: 320px; }
      .snapshot-compact { padding: 12px; }
      .snapshot-metrics { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .detail-meta-item { flex-basis: calc(50% - 8px); }
      .json-collection-head { display: none; }
      .json-row-summary {
        grid-template-columns: 1fr;
      }
      .json-cell-action {
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <section class="top-controls">
      <div class="top-controls-header">
        <div class="tab-cluster">
          <div class="eyebrow">Sections</div>
          <div class="tabs" id="section-tabs"></div>
        </div>
        <div class="top-controls-note">
          Generated on <strong>__GENERATED_AT__</strong>.
        </div>
      </div>
      <div class="top-controls-filter-row">
        <div class="filter-block project-filter-block">
          <label class="filter-label" for="project-filter">Filter by project</label>
          <select id="project-filter"></select>
        </div>
        <div class="filter-block search-filter-block">
          <label class="filter-label" for="search-filter">Search</label>
          <input id="search-filter" type="search" placeholder="Execution items or section content">
        </div>
      </div>
    </section>

    <section class="tab-panel is-active" id="execution-panel">
      <section class="snapshot snapshot-compact">
        <div class="snapshot-strip">
          <div class="snapshot-summary">
            <div class="eyebrow">Execution Snapshot</div>
            <h2 class="snapshot-title">Execution Snapshot</h2>
          </div>
          <div class="snapshot-secondary">
            <div class="warning-strip" id="warning-strip">
              <div class="warning-text" id="warning-text"></div>
            </div>
            <div class="stats snapshot-metrics">
              <div class="stat">
                <span class="stat-label">Projects</span>
                <span class="stat-value" id="project-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Visible Items</span>
                <span class="stat-value" id="item-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Blocked</span>
                <span class="stat-value" id="blocked-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Due Within 7 Days</span>
                <span class="stat-value" id="due-soon-count">0</span>
              </div>
              <div class="stat">
                <span class="stat-label">Overdue</span>
                <span class="stat-value" id="overdue-count">0</span>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="filters">
        <div class="filters-grid">
          <div class="filter-block">
            <label class="filter-label" for="status-filter">Filter by status</label>
            <select id="status-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="type-filter">Filter by type</label>
            <select id="type-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="owner-filter">Filter by owner</label>
            <select id="owner-filter"></select>
          </div>
          <div class="filter-block">
            <label class="filter-label" for="priority-filter">Filter by priority</label>
            <select id="priority-filter"></select>
          </div>
        </div>
      </section>

      <section class="execution-flow">
        <aside class="details execution-details" id="details"></aside>
        <div class="board">
          <div class="columns" id="columns"></div>
        </div>
      </section>
    </section>

    <section class="tab-panel" id="document-panel">
      <section class="doc-layout">
        <aside class="doc-nav">
          <div class="eyebrow" id="doc-eyebrow">Section</div>
          <h2 id="doc-section-title">Current Overview</h2>
          <p id="doc-section-description"></p>
          <div class="doc-links" id="doc-links"></div>
        </aside>
        <article class="doc-viewer">
          <div class="doc-article" id="doc-viewer-content"></div>
        </article>
      </section>
    </section>
  </div>
  <script>
    const DASHBOARD_DATA_RAW = __DASHBOARD_DATA__;
    const DASHBOARD_WARNINGS_RAW = __DASHBOARD_WARNINGS__;
    const WORKSPACE_SECTIONS_RAW = __WORKSPACE_SECTIONS__;
    const STATUS_GROUPS = {
      active: [
        { key: "planned", label: "Planned" },
        { key: "in_progress", label: "In Progress" },
        { key: "blocked", label: "Blocked" },
        { key: "done", label: "Done" }
      ],
      inactive: [
        { key: "backlog", label: "Backlog" },
        { key: "abandonned", label: "Abandonned" },
        { key: "done", label: "Done" }
      ]
    };

    function ensureArray(value) {
      if (Array.isArray(value)) {
        return value;
      }
      if (value === null || value === undefined || value === "") {
        return [];
      }
      return [value];
    }

    function normalizeItems(items) {
      return ensureArray(items).map((item) => ({
        ...item,
        dependencies: ensureArray(item.dependencies),
        linked_artifacts: ensureArray(item.linked_artifacts),
        notes: ensureArray(item.notes),
        definition_of_done: ensureArray(item.definition_of_done),
        deliverables: ensureArray(item.deliverables)
      }));
    }

    function normalizeSections(sections) {
      return ensureArray(sections).map((section) => ({
        ...section,
        documents: ensureArray(section.documents)
      }));
    }

    const DASHBOARD_DATA = normalizeItems(DASHBOARD_DATA_RAW);
    const DASHBOARD_WARNINGS = ensureArray(DASHBOARD_WARNINGS_RAW);
    const WORKSPACE_SECTIONS = normalizeSections(WORKSPACE_SECTIONS_RAW);

    const els = {
      sectionTabs: document.getElementById("section-tabs"),
      executionPanel: document.getElementById("execution-panel"),
      documentPanel: document.getElementById("document-panel"),
      projectFilter: document.getElementById("project-filter"),
      statusFilter: document.getElementById("status-filter"),
      typeFilter: document.getElementById("type-filter"),
      ownerFilter: document.getElementById("owner-filter"),
      priorityFilter: document.getElementById("priority-filter"),
      searchFilter: document.getElementById("search-filter"),
      columns: document.getElementById("columns"),
      details: document.getElementById("details"),
      warningStrip: document.getElementById("warning-strip"),
      warningText: document.getElementById("warning-text"),
      projectCount: document.getElementById("project-count"),
      itemCount: document.getElementById("item-count"),
      blockedCount: document.getElementById("blocked-count"),
      dueSoonCount: document.getElementById("due-soon-count"),
      overdueCount: document.getElementById("overdue-count"),
      docEyebrow: document.getElementById("doc-eyebrow"),
      docSectionTitle: document.getElementById("doc-section-title"),
      docSectionDescription: document.getElementById("doc-section-description"),
      docLinks: document.getElementById("doc-links"),
      docViewerContent: document.getElementById("doc-viewer-content")
    };

    const state = {
      activeSectionKey: "execution_items",
      selectedId: DASHBOARD_DATA[0] ? DASHBOARD_DATA[0].id : null,
      selectedDocumentIds: {}
    };

    function titleCase(value) {
      return value.replaceAll("_", " ").replace(/\b\w/g, (match) => match.toUpperCase());
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderInlineMarkdown(text) {
      return escapeHtml(text)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noreferrer">$1</a>');
    }

    function getSearchValue() {
      return els.searchFilter.value.trim().toLowerCase();
    }

    function collectSearchText(value, parts = []) {
      if (value === null || value === undefined) {
        return parts;
      }

      if (Array.isArray(value)) {
        value.forEach((entry) => collectSearchText(entry, parts));
        return parts;
      }

      if (typeof value === "object") {
        Object.entries(value).forEach(([key, entryValue]) => {
          parts.push(String(key));
          collectSearchText(entryValue, parts);
        });
        return parts;
      }

      parts.push(String(value));
      return parts;
    }

    function getDocumentSearchText(document) {
      return collectSearchText([
        document.title,
        document.preview,
        document.relative_path,
        document.content
      ]).join(" ").toLowerCase();
    }

    function jsonValueMatchesSearch(value, searchValue) {
      if (!searchValue) {
        return true;
      }
      return collectSearchText(value).join(" ").toLowerCase().includes(searchValue);
    }

    function documentMatchesSearch(document) {
      const searchValue = getSearchValue();
      if (!searchValue) {
        return true;
      }
      return getDocumentSearchText(document).includes(searchValue);
    }

    function highlightTextNode(node, searchValue) {
      if (!node || !node.nodeValue) {
        return;
      }

      const text = node.nodeValue;
      const lowerText = text.toLowerCase();
      const matchIndex = lowerText.indexOf(searchValue);
      if (matchIndex === -1) {
        return;
      }

      const fragment = document.createDocumentFragment();
      let start = 0;
      let index = matchIndex;

      while (index !== -1) {
        if (index > start) {
          fragment.appendChild(document.createTextNode(text.slice(start, index)));
        }

        const mark = document.createElement("mark");
        mark.textContent = text.slice(index, index + searchValue.length);
        fragment.appendChild(mark);

        start = index + searchValue.length;
        index = lowerText.indexOf(searchValue, start);
      }

      if (start < text.length) {
        fragment.appendChild(document.createTextNode(text.slice(start)));
      }

      node.parentNode.replaceChild(fragment, node);
    }

    function highlightVisibleTextMatches(container, searchValue) {
      if (!container || !searchValue) {
        return;
      }

      const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT, {
        acceptNode(node) {
          const parentName = node.parentElement ? node.parentElement.tagName : "";
          if (!node.nodeValue || !node.nodeValue.trim()) {
            return NodeFilter.FILTER_REJECT;
          }
          if (["CODE", "PRE", "MARK", "SCRIPT", "STYLE"].includes(parentName)) {
            return NodeFilter.FILTER_REJECT;
          }
          return NodeFilter.FILTER_ACCEPT;
        }
      });

      const textNodes = [];
      while (walker.nextNode()) {
        textNodes.push(walker.currentNode);
      }

      textNodes.forEach((node) => highlightTextNode(node, searchValue));
    }

    function renderMarkdown(source) {
      const lines = String(source || "").replace(/\r\n/g, "\n").split("\n");
      const blocks = [];
      let paragraph = [];
      let listItems = [];
      let codeLines = [];
      let inCode = false;

      function flushParagraph() {
        if (!paragraph.length) {
          return;
        }
        blocks.push(`<p>${renderInlineMarkdown(paragraph.join(" "))}</p>`);
        paragraph = [];
      }

      function flushList() {
        if (!listItems.length) {
          return;
        }
        blocks.push(`<ul>${listItems.map((item) => `<li>${renderInlineMarkdown(item)}</li>`).join("")}</ul>`);
        listItems = [];
      }

      function flushCode() {
        if (!codeLines.length) {
          return;
        }
        blocks.push(`<pre>${escapeHtml(codeLines.join("\n"))}</pre>`);
        codeLines = [];
      }

      lines.forEach((line) => {
        if (line.trim().startsWith("```")) {
          flushParagraph();
          flushList();
          if (inCode) {
            flushCode();
          }
          inCode = !inCode;
          return;
        }

        if (inCode) {
          codeLines.push(line);
          return;
        }

        const heading = line.match(/^(#{1,3})\s+(.*)$/);
        if (heading) {
          flushParagraph();
          flushList();
          const level = Math.min(heading[1].length, 3);
          blocks.push(`<h${level}>${renderInlineMarkdown(heading[2].trim())}</h${level}>`);
          return;
        }

        const listItem = line.match(/^[-*]\s+(.*)$/);
        if (listItem) {
          flushParagraph();
          listItems.push(listItem[1].trim());
          return;
        }

        if (!line.trim()) {
          flushParagraph();
          flushList();
          return;
        }

        paragraph.push(line.trim());
      });

      flushParagraph();
      flushList();
      flushCode();

      return blocks.length ? blocks.join("") : '<div class="empty-state">No Markdown content available.</div>';
    }

    function isJsonObject(value) {
      return Boolean(value) && !Array.isArray(value) && typeof value === "object";
    }

    function isPrimitiveJsonValue(value) {
      return value === null || value === undefined || typeof value !== "object";
    }

    function isStructuredJsonValue(value) {
      return Array.isArray(value) || isJsonObject(value);
    }

    function summarizeJsonValue(value) {
      if (value === null || value === undefined || value === "") {
        return "-";
      }

      if (Array.isArray(value)) {
        if (!value.length) {
          return "[]";
        }

        const primitiveValues = value.every(isPrimitiveJsonValue);
        if (primitiveValues) {
          const preview = value.slice(0, 3).map((entry) => String(entry)).join(", ");
          return value.length > 3 ? `${preview} +${value.length - 3}` : preview;
        }

        return `${value.length} entries`;
      }

      if (isJsonObject(value)) {
        const recordLabel = value.id || value.title || value.name || value.key;
        if (recordLabel !== undefined && recordLabel !== null && recordLabel !== "") {
          return String(recordLabel);
        }
        return `${Object.keys(value).length} fields`;
      }

      return String(value);
    }

    function getJsonScanColumns(entries) {
      const priority = [
        "id",
        "title",
        "name",
        "description",
        "change_summary",
        "status",
        "owner",
        "summary",
        "target_date",
        "date",
        "last_updated"
      ];
      const frequency = new Map();

      entries.forEach((entry) => {
        if (!isJsonObject(entry)) {
          return;
        }

        Object.keys(entry).forEach((key) => {
          frequency.set(key, (frequency.get(key) || 0) + 1);
        });
      });

      return [...frequency.entries()]
        .filter(([key]) => !["notes", "linked_artifacts", "dependencies"].includes(key))
        .sort((left, right) => {
          const [leftKey, leftCount] = left;
          const [rightKey, rightCount] = right;
          const leftPriority = priority.indexOf(leftKey);
          const rightPriority = priority.indexOf(rightKey);

          if (leftPriority !== -1 || rightPriority !== -1) {
            if (leftPriority === -1) {
              return 1;
            }
            if (rightPriority === -1) {
              return -1;
            }
            if (leftPriority !== rightPriority) {
              return leftPriority - rightPriority;
            }
          }

          if (leftCount !== rightCount) {
            return rightCount - leftCount;
          }

          return leftKey.localeCompare(rightKey);
        })
        .slice(0, 4)
        .map(([key]) => key);
    }

    function isGlossaryCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "term") &&
        Object.prototype.hasOwnProperty.call(entry, "definition")
      );
    }

    function isStakeholderCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "id") &&
        Object.prototype.hasOwnProperty.call(entry, "name") &&
        Object.prototype.hasOwnProperty.call(entry, "affiliation") &&
        Object.prototype.hasOwnProperty.call(entry, "role")
      );
    }

    function isRequirementCollection(entries) {
      return entries.length > 0 && entries.every((entry) =>
        isJsonObject(entry) &&
        Object.prototype.hasOwnProperty.call(entry, "id") &&
        Object.prototype.hasOwnProperty.call(entry, "statement") &&
        Object.prototype.hasOwnProperty.call(entry, "status") &&
        Object.prototype.hasOwnProperty.call(entry, "date_of_last_update")
      );
    }

    function getJsonCollectionConfig(entries) {
      if (isGlossaryCollection(entries)) {
        return {
          columns: ["id", "term", "definition"],
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      if (isRequirementCollection(entries)) {
        return {
          columns: ["id", "statement", "status", "date_of_last_update"],
          labels: {
            id: "ID",
            statement: "Statement",
            status: "Status",
            date_of_last_update: "Date of last update"
          },
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      if (isStakeholderCollection(entries)) {
        return {
          columns: ["id", "name", "affiliation", "role"],
          showRowIndex: false,
          actionLabel: "Inspect"
        };
      }

      return {
        columns: getJsonScanColumns(entries),
        showRowIndex: true,
        actionLabel: "Inspect"
      };
    }

    function renderPrimitiveList(values) {
      return `<ul class="json-inline-list">${values.map((entry) => `<li>${escapeHtml(entry)}</li>`).join("")}</ul>`;
    }

    function renderJsonObjectEntries(value, options = {}) {
      const { depth = 0, searchValue = "" } = options;
      const entries = Object.entries(value)
        .filter(([key, entryValue]) => depth !== 0 || !searchValue || jsonValueMatchesSearch([key, entryValue], searchValue));
      return entries.length
        ? `<div class="json-object">${entries.map(([key, entryValue]) => `
            <div class="json-entry${isStructuredJsonValue(entryValue) ? " json-entry-complex" : ""}">
              <span class="json-key">${escapeHtml(key)}</span>
              ${renderJsonValue(entryValue, { depth: depth + 1, searchValue })}
            </div>
          `).join("")}</div>`
        : '<div class="json-primitive">{}</div>';
    }

    function renderJsonCompactCollection(entries, options = {}) {
      const { columns, labels = {}, showRowIndex, actionLabel } = getJsonCollectionConfig(entries);
      const cellsTemplate = columns.length
        ? columns.map((key) => `<span class="json-column-label">${escapeHtml(labels[key] || titleCase(key))}</span>`).join("")
        : '<span class="json-column-label">Value</span>';
      const columnCount = columns.length || 1;
      const tableClass = showRowIndex ? "json-collection-table" : "json-collection-table no-row-index";
      const rowHeader = showRowIndex ? '<span class="json-column-label">Row</span>' : "";

      return `
        <div class="${tableClass}" style="--json-column-count:${columnCount}">
          <div class="json-collection-head">
            ${rowHeader}
            ${cellsTemplate}
            <span class="json-column-label json-column-action">${escapeHtml(actionLabel)}</span>
          </div>
          ${entries.map((entry, index) => {
            const summaryCells = columns.length
              ? columns.map((key) => `<span class="json-cell">${escapeHtml(summarizeJsonValue(entry[key]))}</span>`).join("")
              : `<span class="json-cell">${escapeHtml(summarizeJsonValue(entry))}</span>`;
            const detailContent = isJsonObject(entry)
              ? renderJsonObjectEntries(entry, { depth: options.depth + 1, searchValue: options.searchValue })
              : renderJsonValue(entry, { depth: options.depth + 1, searchValue: options.searchValue });
            return `
              <details class="json-row-details">
                <summary class="json-row-summary">
                  ${showRowIndex ? `<span class="json-row-index">${index + 1}</span>` : ""}
                  ${summaryCells}
                  <span class="json-cell json-cell-action">${escapeHtml(actionLabel)}</span>
                </summary>
                <div class="json-row-panel">
                  ${detailContent}
                </div>
              </details>
            `;
          }).join("")}
        </div>
      `;
    }

    function renderJsonValue(value, options = {}) {
      const { depth = 0, searchValue = "" } = options;
      if (value === null || value === undefined) {
        return '<div class="json-primitive">null</div>';
      }

      if (Array.isArray(value)) {
        const visibleItems = depth === 0 && searchValue
          ? value.filter((entry) => jsonValueMatchesSearch(entry, searchValue))
          : value;
        if (!visibleItems.length) {
          return '<div class="json-primitive">[]</div>';
        }

        const allPrimitive = visibleItems.every((entry) => entry === null || typeof entry !== "object");
        if (allPrimitive) {
          return renderPrimitiveList(visibleItems);
        }

        if (visibleItems.every((entry) => isJsonObject(entry))) {
          return renderJsonCompactCollection(visibleItems, { depth, searchValue });
        }

        return `<div class="json-array">${visibleItems.map((entry, index) => `
          <div class="json-card">
            <span class="json-key">Item ${index + 1}</span>
            ${renderJsonValue(entry, { depth: depth + 1, searchValue })}
          </div>
        `).join("")}</div>`;
      }

      if (typeof value === "object") {
        return renderJsonObjectEntries(value, { depth, searchValue });
      }

      return `<div class="json-primitive">${escapeHtml(value)}</div>`;
    }

    function getSection(sectionKey) {
      return WORKSPACE_SECTIONS.find((section) => section.key === sectionKey) || null;
    }

    function getSelectedDocument(section) {
      if (!section || section.type !== "documents") {
        return null;
      }
      const documents = getVisibleDocuments(section);
      const selectedId = state.selectedDocumentIds[section.key];
      return documents.find((document) => document.id === selectedId) || documents[0] || null;
    }

    function parseDateValue(value) {
      if (!value) {
        return null;
      }
      const parsed = new Date(`${value}T00:00:00`);
      return Number.isNaN(parsed.valueOf()) ? null : parsed;
    }

    function isRecentlyDone(item) {
      if (item.status !== "done") {
        return false;
      }

      const completedAt = parseDateValue(item.completion_date) || parseDateValue(item.target_date);
      if (!completedAt) {
        return true;
      }

      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const diffDays = Math.floor((today - completedAt) / 86400000);
      return diffDays <= 14;
    }

    function getLifecycleGroup(item) {
      if (item.status === "planned" || item.status === "in_progress" || item.status === "blocked") {
        return "active";
      }
      if (item.status === "backlog" || item.status === "abandonned") {
        return "inactive";
      }
      if (item.status === "done") {
        return isRecentlyDone(item) ? "active" : "inactive";
      }
      return "";
    }

    function getSelectedStatusGroup() {
      return els.statusFilter.value || "active";
    }

    function getVisibleStatusColumns() {
      return STATUS_GROUPS[getSelectedStatusGroup()] || STATUS_GROUPS.active;
    }

    function isDueSoon(item) {
      if (!item.target_date || item.status === "done" || item.status === "backlog" || item.status === "abandonned") {
        return false;
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseDateValue(item.target_date);
      if (!target) {
        return false;
      }
      const diffDays = Math.floor((target - today) / 86400000);
      return diffDays >= 0 && diffDays <= 7;
    }

    function isOverdue(item) {
      if (!item.target_date || item.status === "done" || item.status === "backlog" || item.status === "abandonned") {
        return false;
      }
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      const target = parseDateValue(item.target_date);
      if (!target) {
        return false;
      }
      const diffDays = Math.floor((target - today) / 86400000);
      return diffDays < 0;
    }

    function buildProjectOptions() {
      const values = [...new Set([
        ...DASHBOARD_DATA.map((item) => item.project_id),
        ...WORKSPACE_SECTIONS.flatMap((section) => ensureArray(section.documents).map((document) => document.project_id))
      ].filter(Boolean))].sort((a, b) => a.localeCompare(b));

      return [{ value: "", label: "All projects" }, ...values.map((value) => ({ value, label: titleCase(value) }))];
    }

    function buildOptions(items, key, fallbackLabel) {
      const values = [...new Set(items.map((item) => item[key]).filter(Boolean))].sort((a, b) => a.localeCompare(b));
      return [{ value: "", label: fallbackLabel }, ...values.map((value) => ({ value, label: titleCase(value) }))];
    }

    function fillSelect(select, options) {
      select.innerHTML = "";
      options.forEach((option) => {
        const element = document.createElement("option");
        element.value = option.value;
        element.textContent = option.label;
        select.appendChild(element);
      });
    }

    function matchesProjectSelection(projectId) {
      return !els.projectFilter.value || projectId === els.projectFilter.value;
    }

    function getVisibleDocuments(section) {
      if (!section || section.type !== "documents") {
        return [];
      }
      return section.documents.filter((document) =>
        matchesProjectSelection(document.project_id) &&
        documentMatchesSearch(document)
      );
    }

    function getProjectScopedExecutionItems() {
      return DASHBOARD_DATA.filter((item) => matchesProjectSelection(item.project_id));
    }

    function getVisibleExecutionItems() {
      return getProjectScopedExecutionItems().filter((item) => getLifecycleGroup(item) === getSelectedStatusGroup());
    }

    function matchesFilters(item) {
      const searchValue = getSearchValue();
      if (getLifecycleGroup(item) !== getSelectedStatusGroup()) {
        return false;
      }
      if (!matchesProjectSelection(item.project_id)) {
        return false;
      }
      if (els.typeFilter.value && item.type !== els.typeFilter.value) {
        return false;
      }
      if (els.ownerFilter.value && item.owner !== els.ownerFilter.value) {
        return false;
      }
      if (els.priorityFilter.value && item.priority !== els.priorityFilter.value) {
        return false;
      }
      if (!searchValue) {
        return true;
      }
      return [item.id, item.title, item.summary, item.project_id, item.owner]
        .filter(Boolean)
        .some((value) => value.toLowerCase().includes(searchValue));
    }

    function renderCard(item) {
      const card = document.createElement("button");
      card.type = "button";
      card.className = "card";
      card.dataset.status = item.status;
      card.innerHTML = `
        <div class="card-top">
          <span class="micro">${item.id}</span>
          <span class="micro">${item.project_id}</span>
        </div>
        <div style="font-size:20px;line-height:1.1;font-weight:700;">${escapeHtml(item.title)}</div>
        <p class="card-summary">${escapeHtml(item.summary || "No summary provided.")}</p>
        <div class="tag-row">
          <span class="tag">${titleCase(item.type)}</span>
          <span class="tag">${escapeHtml(item.owner || "Unassigned")}</span>
          ${item.priority ? `<span class="tag">${titleCase(item.priority)}</span>` : ""}
        </div>
        <div class="card-meta" style="margin-top:12px;">
          <span class="micro">${escapeHtml(item.target_date || "No target date")}</span>
          <span class="micro">${titleCase(item.status)}</span>
        </div>
      `;
      card.addEventListener("click", () => {
        state.selectedId = item.id;
        renderDetails(item);
      });
      return card;
    }

    function renderDetails(item) {
      if (!item) {
        els.details.innerHTML = `
          <div class="eyebrow">Details</div>
          <h2>No item selected</h2>
          <p>Select a card to inspect the normalized execution metadata.</p>
        `;
        return;
      }

      const focusList = item.type === "milestone" ? item.deliverables : item.definition_of_done;
      const focusLabel = item.type === "milestone" ? "Deliverables" : "Definition of Done";
      const dependencies = item.dependencies.length
        ? `<ul>${item.dependencies.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`
        : `<p>No dependencies recorded.</p>`;
      const focusSection = focusList.length
        ? `<ul>${focusList.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`
        : `<p>No ${focusLabel.toLowerCase()} recorded.</p>`;
      const notesSection = item.notes.length
        ? `<ul>${item.notes.map((value) => `<li>${escapeHtml(value)}</li>`).join("")}</ul>`
        : `<p>No notes recorded.</p>`;

      els.details.innerHTML = `
        <div class="eyebrow">Details / ${escapeHtml(item.project_id)}</div>
        <h2>${escapeHtml(item.title)}</h2>
        <p class="details-summary">${escapeHtml(item.summary || "No summary provided.")}</p>
        <div class="details-meta-list" aria-label="Execution item metadata">
          <div class="detail-meta-item">
            <span class="stat-label">ID</span>
            <span class="micro">${escapeHtml(item.id)}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Status</span>
            <span class="micro">${titleCase(item.status)}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Owner</span>
            <span class="micro">${escapeHtml(item.owner || "Unassigned")}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Target Date</span>
            <span class="micro">${escapeHtml(item.target_date || "None")}</span>
          </div>
        </div>
        ${item.problem_statement ? `
          <div class="details-section">
            <h3>Problem Statement</h3>
            <p>${escapeHtml(item.problem_statement)}</p>
          </div>
        ` : ""}
        <div class="details-section">
          <h3>${focusLabel}</h3>
          ${focusSection}
        </div>
        <div class="details-section">
          <h3>Dependencies</h3>
          ${dependencies}
        </div>
        <div class="details-section">
          <h3>Notes</h3>
          ${notesSection}
        </div>
        <div class="details-section">
          <h3>Source File</h3>
          <p class="details-path">${item.relative_path}</p>
        </div>
      `;
    }

    function renderBoard() {
      const filteredItems = DASHBOARD_DATA.filter(matchesFilters);
      const visibleColumns = getVisibleStatusColumns();
      els.columns.innerHTML = "";
      els.columns.style.gridTemplateColumns = `repeat(${visibleColumns.length}, minmax(240px, 1fr))`;

      visibleColumns.forEach((column) => {
        const items = filteredItems.filter((item) => item.status === column.key);
        const columnNode = document.createElement("section");
        columnNode.className = "column";

        const stack = document.createElement("div");
        stack.className = "card-stack";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "No items match this column.";
          stack.appendChild(empty);
        } else {
          items.forEach((item) => stack.appendChild(renderCard(item)));
        }

        columnNode.innerHTML = `
          <div class="column-header">
            <div class="column-title">
              <span class="status-chip status-${column.key}"></span>
              <span>${column.label}</span>
            </div>
            <span class="count-pill">${items.length}</span>
          </div>
        `;
        columnNode.appendChild(stack);
        els.columns.appendChild(columnNode);
      });

      const visibleProjects = new Set(filteredItems.map((item) => item.project_id));
      els.projectCount.textContent = String(visibleProjects.size);
      els.itemCount.textContent = String(filteredItems.length);
      els.blockedCount.textContent = String(filteredItems.filter((item) => item.status === "blocked").length);
      els.dueSoonCount.textContent = String(filteredItems.filter(isDueSoon).length);
      els.overdueCount.textContent = String(filteredItems.filter(isOverdue).length);

      const selected = filteredItems.find((item) => item.id === state.selectedId) || filteredItems[0] || null;
      state.selectedId = selected ? selected.id : null;
      renderDetails(selected);
    }

    function renderWarnings() {
      if (!DASHBOARD_WARNINGS.length) {
        els.warningStrip.classList.remove("is-visible");
        return;
      }
      els.warningText.textContent = DASHBOARD_WARNINGS.join(" ");
      els.warningStrip.classList.add("is-visible");
    }

    function renderSectionTabs() {
      els.sectionTabs.innerHTML = "";
      WORKSPACE_SECTIONS.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab-button${state.activeSectionKey === section.key ? " is-active" : ""}`;
        const count = section.type === "board"
          ? `${getVisibleExecutionItems().length} items`
          : `${getVisibleDocuments(section).length} files`;
        button.innerHTML = `
          <span class="tab-title">${escapeHtml(section.label)}</span>
          <span class="tab-caption">${escapeHtml(count)}</span>
        `;
        button.addEventListener("click", () => {
          state.activeSectionKey = section.key;
          renderActiveSection();
        });
        els.sectionTabs.appendChild(button);
      });
    }

    function renderDocumentLinks(section, selectedDocument) {
      const documents = getVisibleDocuments(section);
      els.docLinks.innerHTML = "";
      if (!documents.length) {
        els.docLinks.innerHTML = '<div class="empty-state">No documents found for this section.</div>';
        return;
      }

      documents.forEach((documentRecord) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `doc-link${selectedDocument && selectedDocument.id === documentRecord.id ? " is-active" : ""}`;
        button.innerHTML = `
          <div class="doc-link-header">
            <span class="doc-meta">${escapeHtml(documentRecord.project_id)}</span>
          </div>
          <span class="doc-link-title">${escapeHtml(documentRecord.title)}</span>
        `;
        button.addEventListener("click", () => {
          state.selectedDocumentIds[section.key] = documentRecord.id;
          renderDocumentsSection(section.key);
        });
        els.docLinks.appendChild(button);
      });
    }

    function renderDocumentContent(document) {
      if (!document) {
        els.docViewerContent.innerHTML = '<div class="empty-state">No document selected.</div>';
        return;
      }

      const searchValue = getSearchValue();
      const contentHtml = document.format === "markdown"
        ? renderMarkdown(document.content)
        : renderJsonValue(document.content, { depth: 0, searchValue });

      els.docViewerContent.innerHTML = `
        <div class="eyebrow">Document / ${escapeHtml(document.project_id)}</div>
        <h2>${escapeHtml(document.title)}</h2>
        ${contentHtml}
      `;

      if (searchValue) {
        highlightVisibleTextMatches(els.docViewerContent, searchValue);
      }
    }

    function renderDocumentsSection(sectionKey) {
      const section = getSection(sectionKey);
      if (!section) {
        return;
      }

      const selectedDocument = getSelectedDocument(section);
      if (selectedDocument) {
        state.selectedDocumentIds[section.key] = selectedDocument.id;
      }

      els.docEyebrow.textContent = `Section / ${section.label}`;
      els.docSectionTitle.textContent = section.label;
      els.docSectionDescription.textContent = section.description || "";
      renderDocumentLinks(section, selectedDocument);
      renderDocumentContent(selectedDocument);
    }

    function renderActiveSection() {
      renderSectionTabs();
      const isExecution = state.activeSectionKey === "execution_items";
      els.executionPanel.classList.toggle("is-active", isExecution);
      els.documentPanel.classList.toggle("is-active", !isExecution);
      if (isExecution) {
        renderBoard();
        return;
      }
      renderDocumentsSection(state.activeSectionKey);
    }

    function initialise() {
      fillSelect(els.projectFilter, buildProjectOptions());
      fillSelect(els.statusFilter, [
        { value: "active", label: "Active" },
        { value: "inactive", label: "Inactive" }
      ]);
      fillSelect(els.typeFilter, buildOptions(DASHBOARD_DATA, "type", "All types"));
      fillSelect(els.ownerFilter, buildOptions(DASHBOARD_DATA, "owner", "All owners"));
      fillSelect(els.priorityFilter, buildOptions(DASHBOARD_DATA, "priority", "All priorities"));
      els.statusFilter.value = "active";

      els.projectFilter.addEventListener("change", renderActiveSection);
      els.statusFilter.addEventListener("change", () => {
        renderSectionTabs();
        renderBoard();
      });
      [els.typeFilter, els.ownerFilter, els.priorityFilter]
        .forEach((element) => element.addEventListener("change", renderBoard));
      els.searchFilter.addEventListener("input", renderActiveSection);

      WORKSPACE_SECTIONS.forEach((section) => {
        if (section.type === "documents" && section.documents[0]) {
          state.selectedDocumentIds[section.key] = section.documents[0].id;
        }
      });

      renderWarnings();
      renderActiveSection();
    }

    initialise();
  </script>
</body>
</html>
