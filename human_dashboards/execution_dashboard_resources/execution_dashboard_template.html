      els.details.innerHTML = `
        <div class="eyebrow">Details / ${escapeHtml(item.project_id)}</div>
        <h2>${escapeHtml(item.title)}</h2>
        <p class="details-summary">${escapeHtml(item.summary || "No summary provided.")}</p>
        <div class="details-meta-list" aria-label="Execution item metadata">
          <div class="detail-meta-item">
            <span class="stat-label">ID</span>
            <span class="micro">${escapeHtml(item.id)}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Status</span>
            <span class="micro">${titleCase(item.status)}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Owner</span>
            <span class="micro">${escapeHtml(item.owner || "Unassigned")}</span>
          </div>
          <div class="detail-meta-item">
            <span class="stat-label">Target Date</span>
            <span class="micro">${escapeHtml(item.target_date || "None")}</span>
          </div>
        </div>
        ${item.problem_statement ? `
          <div class="details-section">
            <h3>Problem Statement</h3>
            <p>${escapeHtml(item.problem_statement)}</p>
          </div>
        ` : ""}
        <div class="details-section">
          <h3>${focusLabel}</h3>
          ${focusSection}
        </div>
        <div class="details-section">
          <h3>Dependencies</h3>
          ${dependencies}
        </div>
        <div class="details-section">
          <h3>Notes</h3>
          ${notesSection}
        </div>
        <div class="details-section">
          <h3>Source File</h3>
          <p class="details-path">${item.relative_path}</p>
        </div>
      `;
    }

    function renderBoard() {
      const filteredItems = DASHBOARD_DATA.filter(matchesFilters);
      const visibleColumns = getVisibleStatusColumns();
      els.columns.innerHTML = "";
      els.columns.style.gridTemplateColumns = `repeat(${visibleColumns.length}, minmax(240px, 1fr))`;

      visibleColumns.forEach((column) => {
        const items = filteredItems.filter((item) => item.status === column.key);
        const columnNode = document.createElement("section");
        columnNode.className = "column";

        const stack = document.createElement("div");
        stack.className = "card-stack";

        if (!items.length) {
          const empty = document.createElement("div");
          empty.className = "empty-state";
          empty.textContent = "No items match this column.";
          stack.appendChild(empty);
        } else {
          items.forEach((item) => stack.appendChild(renderCard(item)));
        }

        columnNode.innerHTML = `
          <div class="column-header">
            <div class="column-title">
              <span class="status-chip status-${column.key}"></span>
              <span>${column.label}</span>
            </div>
            <span class="count-pill">${items.length}</span>
          </div>
        `;
        columnNode.appendChild(stack);
        els.columns.appendChild(columnNode);
      });

      const visibleProjects = new Set(filteredItems.map((item) => item.project_id));
      els.projectCount.textContent = String(visibleProjects.size);
      els.itemCount.textContent = String(filteredItems.length);
      els.blockedCount.textContent = String(filteredItems.filter((item) => item.status === "blocked").length);
      els.dueSoonCount.textContent = String(filteredItems.filter(isDueSoon).length);
      els.overdueCount.textContent = String(filteredItems.filter(isOverdue).length);

      const selected = filteredItems.find((item) => item.id === state.selectedId) || filteredItems[0] || null;
      state.selectedId = selected ? selected.id : null;
      renderDetails(selected);
      applyPendingNavigation();
    }

    function renderWarnings() {
      if (!DASHBOARD_WARNINGS.length) {
        els.warningStrip.classList.remove("is-visible");
        return;
      }
      els.warningText.textContent = DASHBOARD_WARNINGS.join(" ");
      els.warningStrip.classList.add("is-visible");
    }

    function renderSectionTabs() {
      els.sectionTabs.innerHTML = "";
      WORKSPACE_SECTIONS.forEach((section) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `tab-button${state.activeSectionKey === section.key ? " is-active" : ""}`;
        const count = section.type === "board"
          ? `${getVisibleExecutionItems().length} items`
          : `${getVisibleDocuments(section).length} files`;
        button.innerHTML = `
          <span class="tab-title">${escapeHtml(section.label)}</span>
          <span class="tab-caption">${escapeHtml(count)}</span>
        `;
        button.addEventListener("click", () => {
          navigateToDashboardTarget(buildSectionNavigationTarget(section.key));
        });
        els.sectionTabs.appendChild(button);
      });
    }

    function renderDocumentLinks(section, selectedDocument) {
      const documents = getVisibleDocuments(section);
      els.docLinks.innerHTML = "";
      if (!documents.length) {
        els.docLinks.innerHTML = '<div class="empty-state">No documents found for this section.</div>';
        return;
      }

      documents.forEach((documentRecord) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `doc-link${selectedDocument && selectedDocument.id === documentRecord.id ? " is-active" : ""}`;
        button.innerHTML = `
          <div class="doc-link-header">
            <span class="doc-meta">${escapeHtml(documentRecord.project_id)}</span>
          </div>
          <span class="doc-link-title">${escapeHtml(documentRecord.title)}</span>
        `;
        button.addEventListener("click", () => {
          navigateToDashboardTarget({
            section: section.key,
            doc: documentRecord.id
          });
        });
        els.docLinks.appendChild(button);
      });
    }

    function renderDocumentContent(document) {
      if (!document) {
        els.docViewerContent.innerHTML = '<div class="empty-state">No document selected.</div>';
        return;
      }

      const searchValue = getSearchValue();
      const contentHtml = document.format === "markdown"
        ? renderMarkdown(document.content, document)
        : renderJsonValue(document.content, { depth: 0, searchValue, jsonPath: "", contextDocument: document });

      els.docViewerContent.innerHTML = `
        <div class="eyebrow">Document / ${escapeHtml(document.project_id)}</div>
        <h2>${escapeHtml(document.title)}</h2>
        ${contentHtml}
      `;

      if (searchValue) {
        highlightVisibleTextMatches(els.docViewerContent, searchValue);
      }

      applyPendingNavigation();
    }

    function renderDocumentsSection(sectionKey) {
      const section = getSection(sectionKey);
      if (!section) {
        return;
      }

      const selectedDocument = getSelectedDocument(section);
      if (selectedDocument) {
        state.selectedDocumentIds[section.key] = selectedDocument.id;
      }

      els.docEyebrow.textContent = `Section / ${section.label}`;
      els.docSectionTitle.textContent = section.label;
      els.docSectionDescription.textContent = section.description || "";
      renderDocumentLinks(section, selectedDocument);
      renderDocumentContent(selectedDocument);
    }

    function renderActiveSection() {
      renderSectionTabs();
      const isExecution = state.activeSectionKey === "execution_items";
      els.executionPanel.classList.toggle("is-active", isExecution);
      els.documentPanel.classList.toggle("is-active", !isExecution);
      if (isExecution) {
        renderBoard();
        return;
      }
      renderDocumentsSection(state.activeSectionKey);
    }

    function clearTargetHighlight() {
      const current = document.querySelector(".is-target");
      if (current) {
        current.classList.remove("is-target");
      }
    }

    function focusElement(element) {
      if (!element) {
        return;
      }

      clearTargetHighlight();
      element.classList.add("is-target");
      element.scrollIntoView({ block: "center", inline: "nearest" });
    }

    function openAncestorDetails(element) {
      let current = element;
      while (current && current !== document.body) {
        if (current.tagName === "DETAILS") {
          current.open = true;
        }
        current = current.parentElement;
      }
    }

    function findJsonNavigationTarget(recordTarget) {
      if (!recordTarget) {
        return null;
      }

      const nodes = [...els.docViewerContent.querySelectorAll("[data-json-record-id], [data-json-path]")];
      return nodes.find((node) =>
        node.dataset.jsonRecordId === recordTarget || node.dataset.jsonPath === recordTarget
      ) || null;
    }

    function applyPendingNavigation() {
      const target = state.pendingNavigation;
      if (!target) {
        restorePendingViewport();
        return;
      }

      if (target.section === "execution_items") {
        const item = EXECUTION_ITEMS_BY_ID.get(target.execution);
        const card = item
          ? [...document.querySelectorAll(".card[data-item-id]")].find((node) => node.dataset.itemId === item.id)
          : null;
        if (card) {
          focusElement(card);
        }
        state.pendingNavigation = null;
        restorePendingViewport();
        return;
      }

      const selectedDocument = DOCUMENTS_BY_ID.get(target.doc);
      if (!selectedDocument || state.activeSectionKey !== selectedDocument.section_key) {
        return;
      }

      if (target.record) {
        const jsonTarget = findJsonNavigationTarget(target.record);
        if (jsonTarget) {
          if (jsonTarget.tagName === "DETAILS") {
            jsonTarget.open = true;
          }
          openAncestorDetails(jsonTarget);
          focusElement(jsonTarget);
          state.pendingNavigation = null;
          restorePendingViewport();
          return;
        }
      }

      if (target.anchor) {
        const headingTarget = [...els.docViewerContent.querySelectorAll("h1, h2, h3")]
          .find((node) => node.id === target.anchor);
        if (headingTarget) {
          focusElement(headingTarget);
          state.pendingNavigation = null;
          restorePendingViewport();
          return;
        }
      }

      focusElement(els.docViewerContent.querySelector("h2") || els.docViewerContent);
      state.pendingNavigation = null;
      restorePendingViewport();
    }

    function applyDashboardTarget(rawTarget, options = {}) {
      const fallbackTarget = buildCurrentDashboardTarget();
      const target = normalizeDashboardTarget(rawTarget || fallbackTarget);

      applyFilterState(target);
      state.currentNavigationTarget = target;

      if (target.execution) {
        const item = EXECUTION_ITEMS_BY_ID.get(target.execution);
        if (!item) {
          renderActiveSection();
          syncCurrentHistoryEntry();
          return;
        }

        if (!matchesProjectSelection(item.project_id)) {
          els.projectFilter.value = item.project_id;
        }
        els.statusFilter.value = target.lifecycle || getLifecycleGroup(item);
        state.activeSectionKey = "execution_items";
        state.selectedId = item.id;
        state.pendingNavigation = target;
        if (options.historyRestore) {
          state.pendingHistoryRestore = options.historyRestore;
        }
        renderActiveSection();
        syncCurrentHistoryEntry();
        return;
      }

      const documentRecord = DOCUMENTS_BY_ID.get(target.doc);
      if (documentRecord) {
        if (!matchesProjectSelection(documentRecord.project_id)) {
          els.projectFilter.value = documentRecord.project_id;
        }
        state.activeSectionKey = documentRecord.section_key;
        state.selectedDocumentIds[documentRecord.section_key] = documentRecord.id;
      } else {
        state.activeSectionKey = target.section || "current_overview";
      }

      state.pendingNavigation = target;
      if (options.historyRestore) {
        state.pendingHistoryRestore = options.historyRestore;
      }
      renderActiveSection();
      syncCurrentHistoryEntry();
    }

    function applyDashboardHashNavigation() {
      const target = parseDashboardHash(window.location.hash) || buildCurrentDashboardTarget();
      applyDashboardTarget(target);
    }

    function navigateToDashboardTarget(target) {
      const nextTarget = normalizeDashboardTarget(target);
      const nextHash = serializeDashboardHash(nextTarget);
      const currentTarget = buildCurrentDashboardTarget();

      if (nextHash === serializeDashboardHash(currentTarget)) {
        state.currentNavigationTarget = nextTarget;
        state.pendingNavigation = nextTarget;
        applyPendingNavigation();
        syncCurrentHistoryEntry(nextTarget);
        return;
      }

      syncCurrentHistoryEntry(currentTarget);
      history.pushState(
        buildHistoryState(nextTarget, { scrollX: 0, scrollY: 0 }),
        "",
        nextHash
      );
      state.pendingHistoryRestore = null;
      applyDashboardTarget(nextTarget, { historyRestore: null });
    }

    function initialise() {
      fillSelect(els.projectFilter, buildProjectOptions());
      fillSelect(els.statusFilter, [
        { value: "active", label: "Active" },
        { value: "inactive", label: "Inactive" }
      ]);
      fillSelect(els.typeFilter, buildOptions(DASHBOARD_DATA, "type", "All types"));
      fillSelect(els.ownerFilter, buildOptions(DASHBOARD_DATA, "owner", "All owners"));
      fillSelect(els.priorityFilter, buildOptions(DASHBOARD_DATA, "priority", "All priorities"));
      els.statusFilter.value = DEFAULT_STATUS_GROUP;

      if ("scrollRestoration" in history) {
        history.scrollRestoration = "manual";
      }

      els.projectFilter.addEventListener("change", () => {
        renderActiveSection();
        syncCurrentHistoryEntry();
      });
      els.statusFilter.addEventListener("change", () => {
        renderSectionTabs();
        renderBoard();
        syncCurrentHistoryEntry();
      });
      [els.typeFilter, els.ownerFilter, els.priorityFilter]
        .forEach((element) => element.addEventListener("change", () => {
          renderBoard();
          syncCurrentHistoryEntry();
        }));
      els.searchFilter.addEventListener("input", () => {
        renderActiveSection();
        syncCurrentHistoryEntry();
      });
      document.addEventListener("click", (event) => {
        const unresolvedLink = event.target.closest("a[data-unresolved-path]");
        if (unresolvedLink) {
          event.preventDefault();
          openUnresolvedLinkOverlay(unresolvedLink.getAttribute("data-unresolved-path"), unresolvedLink);
          return;
        }

        const link = event.target.closest("a[data-dashboard-link]");
        if (!link) {
          return;
        }
        event.preventDefault();
        const target = parseDashboardHash(link.getAttribute("href"));
        if (target) {
          navigateToDashboardTarget(target);
        }
      });
      els.unresolvedLinkOverlay.addEventListener("click", (event) => {
        if (!event.target.closest(".floating-overlay-panel")) {
          closeUnresolvedLinkOverlay();
        }
      });
      els.unresolvedLinkCopy.addEventListener("click", () => {
        copyTextToClipboard(state.unresolvedLinkPath).then((copied) => {
          setUnresolvedLinkCopyState(copied ? "copied" : "error");
        });
      });
      window.addEventListener("resize", () => {
        if (els.unresolvedLinkOverlay.getAttribute("data-state") === "open") {
          positionUnresolvedOverlay(state.unresolvedLinkTrigger);
        }
      });
      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") {
          closeUnresolvedLinkOverlay();
        }
      });
      window.addEventListener("scroll", queueHistorySnapshotSync, { passive: true });
      window.addEventListener("hashchange", () => {
        if (state.ignoreNextHashChange) {
          state.ignoreNextHashChange = false;
          return;
        }
        applyDashboardHashNavigation();
      });
      window.addEventListener("popstate", (event) => {
        state.ignoreNextHashChange = true;
        window.setTimeout(() => {
          state.ignoreNextHashChange = false;
        }, 0);
        const target = event.state?.target || parseDashboardHash(window.location.hash) || buildCurrentDashboardTarget();
        applyDashboardTarget(target, { historyRestore: event.state || null });
      });

      WORKSPACE_SECTIONS.forEach((section) => {
        if (section.type === "documents" && section.documents[0]) {
          state.selectedDocumentIds[section.key] = section.documents[0].id;
        }
      });

      renderWarnings();
      const initialTarget = parseDashboardHash(window.location.hash);
      if (initialTarget) {
        applyDashboardTarget(initialTarget);
        return;
      }

      renderActiveSection();
      syncCurrentHistoryEntry();
    }

    initialise();
  </script>
</body>
</html>
